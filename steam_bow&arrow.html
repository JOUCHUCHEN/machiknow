<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO 9868 SPM: Bow & Arrow - STEAM Project</title>
    
    <!-- 引入 Noto Sans TC 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '3rem',
                    }
                }
            }
        }
    </script>

    <!-- 自訂 CSS -->
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        /* 防止 iframe 被圓角切掉的優化 */
        .video-container {
            mask-image: radial-gradient(white, black);
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }
    </style>

    <!-- Import Maps -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 h-screen overflow-hidden text-slate-900">
    <!-- React 應用的掛載點 -->
    <div id="root" class="h-full"></div>

    <!-- 應用程式主體程式碼 -->
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Youtube, ExternalLink, AlertCircle, Lightbulb, Rocket, PlayCircle, Menu, X
        } from 'lucide-react';

        // --- 共用元件：廣告版位 ---
        const AdBanner = ({ format = 'horizontal', className = "" }) => (
          <div className={`relative flex items-center justify-center bg-gray-50 border-2 border-dashed border-gray-200 text-gray-400 rounded-2xl overflow-hidden ${format === 'horizontal' ? 'w-full h-20 my-2' : 'w-full aspect-square max-h-[250px] my-4'} ${className}`}>
            <span className="absolute top-2 right-3 text-[9px] bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded uppercase tracking-widest font-bold">AD Space</span>
            <p className="font-bold text-xs opacity-50">{format === 'horizontal' ? '728 x 90' : '300 x 250'}</p>
          </div>
        );

        // --- Main App Component ---
        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const videoId = "ieDNvJNf0ag";
          const youtubeUrl = `https://www.youtube.com/watch?v=${videoId}`;

          // 導航行為：這裡假設回首頁是跳轉到 index.html 或捲動到頂部
          const handleHomeClick = () => {
             // 如果是單頁應用可以用 scrollTo，如果是多頁可以改為 window.location.href = 'index.html'
             window.scrollTo({ top: 0, behavior: 'smooth' });
             setIsMobileMenuOpen(false);
          };

          const Navbar = () => (
            <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
                {/* Logo 區域 */}
                <div className="flex items-center cursor-pointer group" onClick={handleHomeClick}>
                  <img 
                    src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                    alt="MachiKnow Official Logo" 
                    className="w-10 h-10 mr-3 rounded-xl shadow-sm border border-orange-100 group-hover:scale-110 group-hover:rotate-6 transition-all"
                  />
                  <span className="font-black text-2xl text-gray-900 tracking-tighter">
                    Machi<span className="text-orange-600">Know</span>
                  </span>
                </div>

                {/* 桌面端選項：僅保留 Home */}
                <div className="hidden md:flex items-center space-x-12">
                  <button 
                    onClick={handleHomeClick} 
                    className="font-bold text-sm text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors"
                  >
                    Home
                  </button>
                </div>

                {/* 行動端選單按鈕 */}
                <button 
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                  className="md:hidden text-gray-600 p-2 hover:bg-gray-100 rounded-lg transition-colors"
                >
                  {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                </button>
              </div>
              
              {/* 行動端下拉選單 */}
              {isMobileMenuOpen && (
                <div className="absolute top-20 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40 animate-in slide-in-from-top-2">
                  <button 
                    onClick={handleHomeClick} 
                    className="text-left font-bold text-gray-700 hover:text-orange-600 transition-colors py-2 border-b border-gray-50"
                  >
                    Home
                  </button>
                </div>
              )}
            </nav>
          );

          return (
            <div className="h-full flex flex-col font-sans">
              <Navbar />

              <main className="flex-1 p-6 lg:p-10 max-w-6xl mx-auto w-full flex flex-col overflow-y-auto custom-scroll">
                
                {/* Header 區塊 */}
                <div className="mb-10">
                    <h2 className="text-4xl font-black text-slate-900 tracking-tight mb-3">LEGO 9868 SPM: Bow & Arrow</h2>
                    <div className="flex items-center gap-2 text-slate-400 font-bold tracking-wider uppercase text-xs">
                        <PlayCircle size={14} className="text-orange-500" />
                        <span>STEAM Project Learning</span>
                        <span className="text-slate-200 mx-1">•</span>
                        <span>Creative Engineering Design</span>
                    </div>
                </div>

                {/* Video Frame: 尺寸與比例控制 */}
                <div className="w-full max-w-5xl mx-auto relative group">
                    <div className="absolute -inset-1 bg-gradient-to-r from-orange-500 to-rose-500 rounded-[3rem] blur opacity-10 group-hover:opacity-20 transition duration-1000"></div>
                    
                    <div className="relative bg-white p-3 md:p-4 rounded-[3.5rem] shadow-2xl border border-slate-100">
                        <div className="aspect-video w-full bg-slate-900 rounded-[2.5rem] overflow-hidden relative shadow-inner video-container">
                            <iframe 
                                className="absolute inset-0 w-full h-full"
                                src={`https://www.youtube-nocookie.com/embed/${videoId}?rel=0&modestbranding=1&autohide=1&showinfo=0`} 
                                title="LEGO 9868 SPM: Bow & Arrow"
                                frameBorder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                                referrerPolicy="no-referrer-when-downgrade"
                                allowFullScreen
                            ></iframe>
                        </div>
                    </div>
                </div>

                {/* 按鈕區塊 */}
                <div className="mt-10 flex flex-col items-center gap-4">
                  <div className="flex items-center gap-2 text-rose-500 text-[10px] font-black uppercase tracking-[0.3em] bg-rose-50 px-3 py-1 rounded-full">
                    <AlertCircle size={12} className="stroke-[3]" /> Playback Error?
                  </div>
                  <a 
                    href={youtubeUrl} 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="flex items-center gap-3 text-base font-bold text-white px-12 py-5 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 rounded-full shadow-[0_10px_40px_-10px_rgba(249,115,22,0.4)] transition-all hover:scale-105 active:scale-95 group"
                  >
                    <Youtube size={24} className="group-hover:animate-pulse" /> 
                    Open in YouTube Player 
                    <ExternalLink size={18} className="opacity-70" />
                  </a>
                </div>

                {/* 資訊區域 */}
                <div className="mt-16 grid grid-cols-1 lg:grid-cols-3 gap-8 pb-20">
                  <div className="lg:col-span-2 bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm relative overflow-hidden group">
                     <div className="absolute top-0 right-0 p-8 opacity-[0.03] group-hover:scale-110 transition-transform duration-700">
                        <Lightbulb size={120} className="text-orange-600" />
                     </div>
                     
                     <h3 className="font-black text-2xl mb-6 flex items-center gap-3 text-orange-600 tracking-tight">
                       <span className="p-2 bg-orange-50 rounded-xl"><Lightbulb className="text-orange-600" size={24} /></span>
                       Project Overview
                     </h3>
                     <p className="text-slate-600 leading-loose text-lg font-medium relative z-10">
                       In this lesson, we will learn how to build a fully functional toy bow and arrow using Lego 9686 set! Through hands-on practice, students will experience basic concepts of physical tension, mechanical principles, and engineering structures, turning creativity into a physical masterpiece.
                     </p>
                  </div>
                  
                  <div className="flex flex-col">
                     <AdBanner format="square" className="!my-0 w-full h-full min-h-[300px] border-slate-200" />
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
