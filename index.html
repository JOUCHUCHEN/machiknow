<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachiKnow - Creative Resource Hub</title>
    
    <!-- 引入 Noto Sans TC 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- 自訂 CSS -->
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>

    <!-- Import Maps -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">
    <!-- React 應用的掛載點 -->
    <div id="root" class="h-full"></div>

    <!-- 應用程式主體程式碼 -->
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Menu, LayoutGrid, Rocket, ChevronRight, Youtube, PlayCircle } from 'lucide-react';

        // --- 共用元件：廣告版位 ---
        const AdBanner = ({ format = 'horizontal', className = "" }) => (
          <div className={`relative flex items-center justify-center bg-gray-100 border-2 border-dashed border-gray-300 text-gray-400 rounded-lg overflow-hidden ${format === 'horizontal' ? 'w-full h-20 my-2' : 'w-full aspect-square max-h-[250px] my-4'} ${className}`}>
            <span className="absolute top-1 right-2 text-[10px] bg-gray-200 text-gray-500 px-1 rounded uppercase tracking-tighter font-bold">AD Space</span>
            <p className="font-semibold text-xs">{format === 'horizontal' ? '728 x 90' : '300 x 250'}</p>
          </div>
        );

        // --- Main App Component ---
        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          // 處理導覽列平滑捲動
          const scrollToSection = (sectionId) => {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
            setIsMobileMenuOpen(false);
          };

          const Navbar = () => (
            <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                <div className="flex items-center cursor-pointer group" onClick={() => scrollToSection('top')}>
                  <img 
                    src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                    alt="MachiKnow Official Logo" 
                    className="w-12 h-12 mr-3 rounded-xl shadow-sm border border-orange-100 group-hover:scale-110 group-hover:rotate-6 transition-all"
                  />
                  <span className="font-black text-3xl text-gray-900 tracking-tighter">
                    Machi<span className="text-orange-600">Know</span>
                  </span>
                </div>
                <div className="hidden md:flex items-center space-x-12">
                  <button onClick={() => scrollToSection('top')} className="font-bold text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors">Home</button>
                  <button onClick={() => scrollToSection('elementary')} className="text-gray-500 font-bold text-base hover:text-orange-600 uppercase tracking-widest transition-colors">Elementary</button>
                  <button onClick={() => scrollToSection('steam')} className="text-gray-500 font-bold text-base hover:text-orange-600 uppercase tracking-widest transition-colors">STEAM</button>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2"><Menu size={28} /></button>
              </div>
              
              {isMobileMenuOpen && (
                <div className="absolute top-20 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40">
                  <button onClick={() => scrollToSection('top')} className="text-left font-bold text-gray-700">Home</button>
                  <button onClick={() => scrollToSection('elementary')} className="text-left font-bold text-gray-700">Elementary</button>
                  <button onClick={() => scrollToSection('steam')} className="text-left font-bold text-gray-700">STEAM</button>
                </div>
              )}
            </nav>
          );

          return (
            <div className="min-h-screen bg-gray-50 flex flex-col h-screen overflow-hidden">
              <Navbar />

              <div className="flex-1 overflow-hidden h-full overflow-y-auto custom-scroll">
                <div id="top" className="max-w-7xl mx-auto px-4 pt-4">
                  <AdBanner format="horizontal" />
                </div>
                
                <header className="max-w-7xl mx-auto px-4 py-6 text-center animate-in fade-in slide-in-from-top-4">
                  <h1 className="text-3xl md:text-5xl font-black text-gray-900 mb-3 tracking-tight leading-none">Creative Resource Hub</h1>
                  <p className="text-gray-500 text-base md:text-lg font-bold leading-relaxed max-w-3xl mx-auto text-center tracking-wide opacity-80">
                    Providing free, professional English and STEAM teaching resources for educators worldwide.
                  </p>
                </header>

                <main className="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-10">
                  <div className="lg:w-4/5">
                    
                    {/* 小學英語區塊 */}
                    <section id="elementary" className="mb-14">
                      <div className="flex items-center mb-8">
                        <LayoutGrid className="text-orange-600 mr-5" size={32} />
                        <h2 className="text-3xl font-black text-gray-900 uppercase tracking-[0.01em]">Elementary English</h2>
                      </div>
                      
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div 
                          onClick={() => window.location.href = 'amazing_animals.html'}
                          className="bg-gradient-to-br from-orange-400 to-amber-700 rounded-[2.5rem] p-8 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.01] transition-all relative overflow-hidden flex flex-col justify-between group shadow-lg min-h-[16rem]"
                        >
                          <div className="absolute right-4 bottom-4 opacity-20 group-hover:opacity-40 transition-opacity transform group-hover:scale-110 duration-700">
                            <span className="text-[8rem]">🦁</span>
                          </div>
                          <div className="relative z-10">
                            <h3 className="text-2xl font-black mb-2 drop-shadow-md">🐾 Amazing Animals</h3>
                            <p className="text-orange-50 text-sm opacity-90 font-bold mt-1">Interactive audio games & fun TPR activities</p>
                          </div>
                          <div className="relative z-10 self-end">
                            <div className="bg-white/20 p-3 rounded-full group-hover:scale-110 transition-all shadow-md backdrop-blur-md">
                              <ChevronRight size={28} />
                            </div>
                          </div>
                        </div>
                      </div>
                    </section>

                    {/* STEAM 教學區塊 */}
                    <section id="steam" className="mb-14">
                      <div className="flex items-center mb-8">
                        <Rocket className="text-orange-600 mr-5" size={32} />
                        <h2 className="text-3xl font-black text-gray-900 uppercase tracking-[0.01em]">STEAM Learning</h2>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* 1. LEGO Ping Pong Launcher */}
                        <div 
                          onClick={() => window.location.href = 'steam_pingponglauncher.html'}
                          className="bg-gradient-to-br from-emerald-500 to-cyan-800 rounded-[2.5rem] p-6 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.01] transition-all relative overflow-hidden flex flex-col group shadow-lg min-h-[26rem]"
                        >
                          <div className="w-full h-64 rounded-2xl overflow-hidden mb-6 bg-white/10 flex items-center justify-center">
                            <img 
                                src="https://i.ibb.co/dsnqrs3k/Ping-Pong-Ball-Machine-Wedo2.png" 
                                alt="LEGO Ping Pong Launcher Cover"
                                className="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500"
                            />
                          </div>
                          
                          <div className="relative z-10 flex-1">
                            <h3 className="text-2xl font-black mb-2 drop-shadow-md leading-tight">LEGO Ping Pong Launcher</h3>
                            <p className="text-emerald-50 text-sm opacity-90 font-bold mt-1 line-clamp-2">Transforming LEGO SPM mechanics into WeDo 2.0 smart control system.</p>
                            <div className="mt-6 flex items-center text-xs font-black uppercase tracking-widest bg-black/20 w-fit px-3 py-1.5 rounded-lg">
                                <span className="mr-2 text-yellow-300">SPM</span> <ChevronRight size={12}/> <span className="ml-1 text-cyan-300">Wedo 2.0</span>
                            </div>
                          </div>
                          
                          <div className="absolute bottom-6 right-6 bg-white/20 p-4 rounded-full group-hover:scale-110 transition-all shadow-md backdrop-blur-md">
                            <PlayCircle size={32} />
                          </div>
                        </div>

                        {/* 2. Bow & Arrow */}
                        <div 
                          onClick={() => window.location.href = 'steam_bow&arrow.html'}
                          className="bg-gradient-to-br from-indigo-500 to-purple-800 rounded-[2.5rem] p-6 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.01] transition-all relative overflow-hidden flex flex-col group shadow-lg min-h-[26rem]"
                        >
                          <div className="w-full h-64 rounded-2xl overflow-hidden mb-6 bg-white/10 flex items-center justify-center relative">
                            <span className="text-[10rem] drop-shadow-2xl group-hover:scale-110 transition-transform duration-500">🏹</span>
                          </div>

                          <div className="relative z-10 flex-1">
                            <h3 className="text-2xl font-black mb-2 drop-shadow-md leading-tight">LEGO 9868 SPM: Bow & Arrow</h3>
                            <p className="text-indigo-50 text-sm opacity-90 font-bold mt-1">Mastering mechanical logic through high-precision LEGO construction.</p>
                            <div className="mt-6 flex items-center text-xs font-black uppercase tracking-widest bg-black/20 w-fit px-3 py-1.5 rounded-lg">
                                <span className="text-yellow-300">MECHANICS</span>
                            </div>
                          </div>

                          <div className="absolute bottom-6 right-6 bg-white/20 p-4 rounded-full group-hover:scale-110 transition-all shadow-md backdrop-blur-md">
                            <Youtube size={32} />
                          </div>
                        </div>
                      </div>
                    </section>

                  </div>

                  <aside className="lg:w-1/5">
                    <div className="sticky top-24 z-10">
                      <AdBanner format="square" />
                      {/* Quick Links block has been removed as requested */}
                    </div>
                  </aside>
                </main>

                <footer className="bg-gray-900 text-white py-20 text-center mt-12">
                  <div className="max-w-7xl mx-auto px-4">
                    <div className="flex items-center justify-center mb-10 text-3xl font-black tracking-tighter uppercase">
                      MachiKnow
                    </div>
                    <div className="pt-10 border-t border-gray-800 text-gray-600 text-[9px] font-black tracking-[0.5em] uppercase">© 2026 MachiKnow. All rights reserved.</div>
                  </div>
                </footer>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
