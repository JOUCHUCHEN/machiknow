<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaachiiKnow - Creative Resource Hub</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        a { text-decoration: none; display: block; }
    </style>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Menu, LayoutGrid, Rocket, ChevronRight, Youtube, PlayCircle, Gamepad2, Wrench } from 'lucide-react';

        // --- STEM L1 課程資料 ---
        const stemL1Projects = [
            { id: 2, title: 'Rubber Band Car', customLink: './steam_rubberbandcar.html', cover: 'https://i.ibb.co/LD5jgtpF/45.png' },
            { id: 3, title: 'Gun' },
            { id: 4, title: 'Tesla' },
            { id: 6, title: 'Frog' },
            { id: 7, title: 'Rebound LEGO Car' },
            { id: 8, title: 'Pac-Man Car' },
            { id: 9, title: 'Basic Crane Mechanism' },
            { id: 10, title: 'Snail' },
            { id: 11, title: 'Machine Gun' },
            { id: 12, title: 'Kayak' },
            { id: 14, title: 'Power Driller' },
            { id: 15, title: 'Supercharged Car' },
            { id: 17, title: 'Sailboat' },
            { id: 18, title: 'Swing' },
            { id: 19, title: 'Catapult' },
            { id: 20, title: 'Whale' },
            { id: 21, title: 'Fishing Rod' },
            { id: 22, title: 'Crane' },
            { id: 23, title: 'Auto Grabber' },
            { id: 24, title: 'Motorcycle with Rubber Band' },
            { id: 25, title: 'Hammer' },
            { id: 26, title: 'Jet' },
            { id: 27, title: 'Bird' },
            { id: 28, title: 'Boxing' },
            { id: 29, title: 'Paperplane Shooter' },
            { id: 30, title: 'Balance Scale' },
            { id: 31, title: 'Quadrupedalism' },
            { id: 33, title: 'Motorcycle' },
            { id: 34, title: 'Pathfinding Car' },
            { id: 35, title: 'Alligator' },
            { id: 36, title: 'Racing Car' }
        ];

        const AdBanner = ({ format = 'horizontal', className = "" }) => (
          <div className={`relative flex items-center justify-center bg-gray-100 border-2 border-dashed border-gray-300 text-gray-400 rounded-lg overflow-hidden ${format === 'horizontal' ? 'w-full h-20 my-2' : 'w-full aspect-square max-h-[250px] my-4'} ${className}`}>
            <span className="absolute top-1 right-2 text-[10px] bg-gray-200 text-gray-500 px-1 rounded uppercase tracking-tighter font-bold">AD Space</span>
            <p className="font-semibold text-xs">{format === 'horizontal' ? '728 x 90' : '300 x 250'}</p>
          </div>
        );

        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          const scrollToSection = (sectionId) => {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth' });
            }
            setIsMobileMenuOpen(false);
          };

          const Navbar = () => (
            <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                <div className="flex items-center cursor-pointer group" onClick={() => scrollToSection('top')}>
                  <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="MaachiiKonw Logo" className="w-16 h-16 object-contain group-hover:scale-110 group-hover:rotate-6 transition-all relative -top-1 left-0 z-0" />
                  <span className="font-black text-3xl text-gray-900 tracking-tighter relative z-10 ml-0">
                    Maachii<span className="text-orange-600">Konw</span>
                  </span>
                </div>
                <div className="hidden md:flex items-center space-x-8 lg:space-x-12">
                  <button onClick={() => scrollToSection('top')} className="font-bold text-sm lg:text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors">Home</button>
                  <button onClick={() => scrollToSection('elementary')} className="text-gray-500 font-bold text-sm lg:text-base hover:text-orange-600 uppercase tracking-widest transition-colors">Elementary</button>
                  <button onClick={() => scrollToSection('steam')} className="text-gray-500 font-bold text-sm lg:text-base hover:text-orange-600 uppercase tracking-widest transition-colors">Bricks</button>
                  <button onClick={() => scrollToSection('scratch')} className="text-gray-500 font-bold text-sm lg:text-base hover:text-orange-600 uppercase tracking-widest transition-colors">Scratch</button>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2"><Menu size={28} /></button>
              </div>
              {isMobileMenuOpen && (
                <div className="absolute top-20 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40">
                  <button onClick={() => scrollToSection('top')} className="text-left font-bold text-gray-700">Home</button>
                  <button onClick={() => scrollToSection('elementary')} className="text-left font-bold text-gray-700">Elementary</button>
                  <button onClick={() => scrollToSection('steam')} className="text-left font-bold text-gray-700">Bricks</button>
                  <button onClick={() => scrollToSection('scratch')} className="text-left font-bold text-gray-700">Scratch</button>
                </div>
              )}
            </nav>
          );

          return (
            <div className="min-h-screen bg-gray-50 flex flex-col h-screen overflow-hidden">
              <Navbar />
              <div className="flex-1 overflow-hidden h-full overflow-y-auto custom-scroll">
                <div id="top" className="max-w-7xl mx-auto px-4 pt-4">
                  <AdBanner format="horizontal" />
                </div>
                
                <header className="max-w-7xl mx-auto px-4 py-6 text-center">
                  <h1 className="text-3xl md:text-5xl font-black text-gray-900 mb-3 tracking-tight">Creative Resource Hub</h1>
                  <p className="text-gray-500 text-base md:text-lg font-bold max-w-3xl mx-auto opacity-80">Providing free, professional English and STEAM teaching resources for educators worldwide.</p>
                </header>

                <main className="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-10">
                  <div className="lg:w-4/5">
                    {/* Elementary Section */}
                    <section id="elementary" className="mb-14">
                      <div className="flex items-center mb-6">
                        <LayoutGrid className="text-orange-600 mr-4" size={28} />
                        <h2 className="text-2xl font-black text-gray-900 uppercase">Elementary English</h2>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                        <a href="./amazing_animals.html" target="_blank" rel="noopener noreferrer" className="bg-gradient-to-br from-orange-400 to-amber-700 rounded-[2rem] p-5 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.01] transition-all relative overflow-hidden flex flex-col justify-between group shadow-lg min-h-[11rem]">
                          <div className="absolute right-2 bottom-2 opacity-20 group-hover:opacity-40 transition-opacity transform group-hover:scale-110 duration-700"><span className="text-[5rem]">🦁</span></div>
                          <div className="relative z-10"><h3 className="text-xl font-black mb-1 drop-shadow-md">🐾 Amazing Animals</h3><p className="text-orange-50 text-xs opacity-90 font-bold">Interactive audio games & fun TPR activities</p></div>
                          <div className="relative z-10 self-end mt-3"><div className="bg-white/20 p-2.5 rounded-full backdrop-blur-md"><ChevronRight size={20} /></div></div>
                        </a>
                      </div>
                    </section>

                    {/* Bricks & Robotics Section */}
                    <section id="steam" className="mb-14">
                      <div className="flex items-center mb-6">
                        <Rocket className="text-orange-600 mr-4" size={28} />
                        <h2 className="text-2xl font-black text-gray-900 uppercase">Bricks & Robotics</h2>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                        {/* Featured: Ping Pong Launcher */}
                        <a href="./steam_pingponglauncher.html" target="_blank" rel="noopener noreferrer" className="bg-gradient-to-br from-emerald-500 to-cyan-800 rounded-[2rem] p-5 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.01] transition-all relative overflow-hidden flex flex-col group shadow-lg min-h-[18rem]">
                          <div className="w-full h-36 rounded-xl overflow-hidden mb-4 bg-white/10 flex items-center justify-center">
                            <img src="https://i.ibb.co/dsnqrs3k/Ping-Pong-Ball-Machine-Wedo2.png" alt="LEGO Ping Pong Launcher" className="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500" />
                          </div>
                          <div className="relative z-10 flex-1"><h3 className="text-lg font-black mb-1 drop-shadow-md leading-tight">LEGO Ping Pong Launcher</h3><p className="text-emerald-50 text-xs opacity-90 font-bold line-clamp-2">Transforming LEGO SPM mechanics into WeDo 2.0 system.</p></div>
                          <div className="absolute bottom-4 right-4 bg-white/20 p-3 rounded-full backdrop-blur-md"><PlayCircle size={24} /></div>
                        </a>

                        {/* Featured: Bow & Arrow */}
                        <a href="./steam_bow&arrow.html" target="_blank" rel="noopener noreferrer" className="bg-gradient-to-br from-indigo-500 to-purple-800 rounded-[2rem] p-5 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.01] transition-all relative overflow-hidden flex flex-col group shadow-lg min-h-[18rem]">
                          <div className="w-full h-36 rounded-xl overflow-hidden mb-4 bg-white/10 flex items-center justify-center">
                            <img src="https://i.ibb.co/p6JXLyd9/45.png" alt="LEGO Bow and Arrow" className="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500" />
                          </div>
                          <div className="relative z-10 flex-1"><h3 className="text-lg font-black mb-1 drop-shadow-md leading-tight">LEGO 9686 SPM: Bow & Arrow</h3><p className="text-indigo-50 text-xs opacity-90 font-bold line-clamp-2">Mastering mechanical logic through high-precision LEGO construction.</p></div>
                          <div className="absolute bottom-4 right-4 bg-white/20 p-3 rounded-full backdrop-blur-md"><Youtube size={24} /></div>
                        </a>

                        {/* Dynamic STEM L1 Projects (Including updated Rubber Band Car) */}
                        {stemL1Projects.map((project, index) => {
                            const themes = ["from-slate-600 to-gray-900", "from-blue-600 to-indigo-900", "from-teal-600 to-emerald-900", "from-violet-600 to-purple-900"];
                            const themeClass = themes[index % 4];
                            const link = project.customLink || `./stem_l1_u1_${project.id}.html`;
                            
                            return (
                                <a key={project.id} href={link} target="_blank" rel="noopener noreferrer" className={`bg-gradient-to-br ${themeClass} rounded-[2rem] p-5 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.01] transition-all relative overflow-hidden flex flex-col group shadow-lg min-h-[18rem]`}>
                                  <div className="w-full h-36 rounded-xl overflow-hidden mb-4 bg-white/10 flex items-center justify-center relative">
                                    {project.cover ? (
                                        <img src={project.cover} className="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500" alt={project.title} />
                                    ) : (
                                        <span className="text-[6rem] drop-shadow-2xl group-hover:scale-110 transition-transform duration-500">⚙️</span>
                                    )}
                                  </div>
                                  <div className="relative z-10 flex-1">
                                    <h3 className="text-lg font-black mb-1 drop-shadow-md leading-tight">{project.title}</h3>
                                    <p className="text-white/80 text-xs font-bold line-clamp-1">Mechanical structure & logic</p>
                                    <div className="mt-3 flex items-center text-[10px] font-black uppercase tracking-widest bg-white/20 w-fit px-2 py-1 rounded-md backdrop-blur-sm"><span>MECHANICS</span></div>
                                  </div>
                                  <div className="absolute bottom-4 right-4 bg-white/20 p-3 rounded-full backdrop-blur-md"><PlayCircle size={24} /></div>
                                </a>
                            );
                        })}
                      </div>
                    </section>

                    {/* Scratch Section */}
                    <section id="scratch" className="mb-14">
                      <div className="flex items-center mb-6">
                        <Gamepad2 className="text-orange-600 mr-4" size={28} />
                        <h2 className="text-2xl font-black text-gray-900 uppercase">Scratch Interactive</h2>
                      </div>
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                        <a href="./scratch_cat_match.html" target="_blank" rel="noopener noreferrer" className="bg-gradient-to-br from-yellow-400 to-orange-500 rounded-[2rem] p-5 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.01] transition-all relative overflow-hidden flex flex-col justify-between group shadow-lg min-h-[11rem]">
                          <div className="absolute right-2 bottom-2 opacity-20 group-hover:opacity-40 transition-opacity transform group-hover:scale-110 duration-700"><span className="text-[5rem]">🐱</span></div>
                          <div className="relative z-10"><h3 className="text-xl font-black mb-1">🐾 貓翻翻樂 (English)</h3><p className="text-yellow-50 text-xs opacity-90 font-bold">Cat Memory Game</p></div>
                          <div className="relative z-10 self-end mt-3"><div className="bg-white/20 p-2.5 rounded-full"><PlayCircle size={20} /></div></div>
                        </a>
                        {/* 其他 Scratch 項目... */}
                      </div>
                    </section>
                  </div>

                  <aside className="lg:w-1/5">
                    <div className="sticky top-24 z-10 flex flex-col gap-4">
                      <AdBanner format="square" />
                      <AdBanner format="square" />
                    </div>
                  </aside>
                </main>

                <footer className="bg-gray-900 text-white py-20 text-center mt-12">
                  <div className="max-w-7xl mx-auto px-4">
                    <div className="flex items-center justify-center mb-10 text-3xl font-black tracking-tighter uppercase">MaachiiKnow</div>
                    <div className="pt-10 border-t border-gray-800 text-gray-600 text-[9px] font-black tracking-[0.5em] uppercase">© 2026 MaachiiKnow. All rights reserved.</div>
                  </div>
                </footer>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
