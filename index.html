<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MachiKnow - Creative Resource Hub</title>
    
    <!-- 引入 Noto Sans TC 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- 自訂 CSS -->
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>

    <!-- Import Maps: 讓瀏覽器可以直接載入 React 與 Lucide Icons -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone: 在瀏覽器中即時編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 h-screen overflow-hidden">
    <!-- React 應用的掛載點 -->
    <div id="root" class="h-full"></div>

    <!-- 應用程式主體程式碼 -->
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Menu, LayoutGrid, Rocket, ChevronRight, Youtube } from 'lucide-react';

        // --- 共用元件：廣告版位 ---
        const AdBanner = ({ format = 'horizontal', className = "" }) => (
          <div className={`relative flex items-center justify-center bg-gray-100 border-2 border-dashed border-gray-300 text-gray-400 rounded-lg overflow-hidden ${format === 'horizontal' ? 'w-full h-20 my-2' : 'w-full aspect-square max-h-[250px] my-4'} ${className}`}>
            <span className="absolute top-1 right-2 text-[10px] bg-gray-200 text-gray-500 px-1 rounded uppercase tracking-tighter font-bold">AD Space</span>
            <p className="font-semibold text-xs">{format === 'horizontal' ? '728 x 90' : '300 x 250'}</p>
          </div>
        );

        // --- Main App Component ---
        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          // 處理導覽列錨點平滑捲動
          const scrollToSection = (sectionId) => {
            document.getElementById(sectionId)?.scrollIntoView({ behavior: 'smooth' });
            setIsMobileMenuOpen(false);
          };

          const Navbar = () => (
            <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50">
              <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                <div className="flex items-center cursor-pointer group" onClick={() => scrollToSection('top')}>
                  <img 
                    src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                    alt="MachiKnow Official Logo" 
                    className="w-12 h-12 mr-3 rounded-xl shadow-sm border border-orange-100 group-hover:scale-110 group-hover:rotate-6 transition-all"
                  />
                  <span className="font-black text-3xl text-gray-900 tracking-tighter">
                    Curio<span className="text-orange-600">Cat</span>
                  </span>
                </div>
                <div className="hidden md:flex items-center space-x-12">
                  <button onClick={() => scrollToSection('top')} className="font-bold text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors">Home</button>
                  <button onClick={() => scrollToSection('elementary')} className="text-gray-500 font-bold text-base hover:text-orange-600 uppercase tracking-widest transition-colors">Elementary</button>
                  <button onClick={() => scrollToSection('steam')} className="text-gray-500 font-bold text-base hover:text-orange-600 uppercase tracking-widest transition-colors">STEAM</button>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2"><Menu size={28} /></button>
              </div>
            </nav>
          );

          return (
            <div className="min-h-screen bg-gray-50 flex flex-col h-screen overflow-hidden">
              <Navbar />

              <div className="flex-1 overflow-hidden h-full overflow-y-auto custom-scroll">
                {/* Top Main Banner Ad */}
                <div id="top" className="max-w-7xl mx-auto px-4 pt-4">
                  <AdBanner format="horizontal" />
                </div>
                
                <header className="max-w-7xl mx-auto px-4 py-6 text-center animate-in fade-in slide-in-from-top-4">
                  <h1 className="text-3xl md:text-5xl font-black text-gray-900 mb-3 tracking-tight leading-none">Creative Resource Hub</h1>
                  <p className="text-gray-500 text-base md:text-lg font-bold leading-relaxed max-w-3xl mx-auto text-center tracking-wide opacity-80">
                    Providing free, professional English and STEAM teaching resources for educators worldwide.
                  </p>
                </header>

                <main className="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-10">
                  <div className="lg:w-4/5">
                    
                    {/* Elementary Section */}
                    <section id="elementary" className="mb-14">
                      <div className="flex items-center mb-10">
                        <LayoutGrid className="text-orange-600 mr-5" size={32} />
                        <h2 className="text-3xl font-black text-gray-900 uppercase tracking-[0.01em]">Elementary English</h2>
                      </div>
                      
                      <div>
                        {/* 連結至 amazing_animals.html */}
                        <div 
                          onClick={() => window.location.href = 'amazing_animals.html'}
                          className="bg-gradient-to-br from-orange-400 to-amber-700 rounded-[3rem] p-8 sm:p-10 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.02] transition-all relative overflow-hidden min-h-[12rem] sm:h-44 flex items-center justify-between group shadow-xl"
                        >
                          <div className="absolute right-6 top-1/2 -translate-y-1/2 opacity-20 group-hover:opacity-40 transition-opacity transform group-hover:scale-125 duration-700">
                            <span className="text-[9rem] sm:text-[10rem]">🦁</span>
                          </div>
                          <div className="relative z-10">
                            <span className="bg-white/20 px-5 py-2 rounded-full text-[10px] font-black tracking-[0.2em] uppercase mb-4 inline-block shadow-sm backdrop-blur-md">Interactive Module</span>
                            <h3 className="text-3xl font-black mb-2 drop-shadow-2xl">🐾 Amazing Animals</h3>
                            <p className="text-orange-50 text-sm opacity-90 font-bold mt-1">Interactive audio games & fun TPR activities</p>
                          </div>
                          <div className="bg-white/20 p-4 rounded-full group-hover:scale-110 transition-all shadow-md backdrop-blur-md">
                            <ChevronRight size={36} />
                          </div>
                        </div>
                      </div>
                    </section>

                    {/* STEAM Section */}
                    <section id="steam" className="mb-14">
                      <div className="flex items-center mb-10">
                        <Rocket className="text-orange-600 mr-5" size={32} />
                        <h2 className="text-3xl font-black text-gray-900 uppercase tracking-[0.01em]">STEAM Learning</h2>
                      </div>

                      <div>
                        {/* 連結至 spm9686_001.html */}
                        <div 
                          onClick={() => window.location.href = 'spm9686_001.html'}
                          className="bg-gradient-to-br from-indigo-500 to-purple-800 rounded-[3rem] p-8 sm:p-10 text-white cursor-pointer hover:shadow-2xl hover:scale-[1.02] transition-all relative overflow-hidden min-h-[12rem] sm:h-44 flex items-center justify-between group shadow-xl"
                        >
                          <div className="absolute right-6 top-1/2 -translate-y-1/2 opacity-20 group-hover:opacity-40 transition-opacity transform group-hover:scale-125 duration-700">
                            <span className="text-[9rem] sm:text-[10rem]">🏹</span>
                          </div>
                          <div className="relative z-10">
                            <span className="bg-white/20 px-5 py-2 rounded-full text-[10px] font-black tracking-[0.2em] uppercase mb-4 inline-block shadow-sm backdrop-blur-md">STEAM Video Lesson</span>
                            <h3 className="text-3xl font-black mb-2 drop-shadow-2xl">🧱 LEGO 9868 SPM: Bow & Arrow</h3>
                            <p className="text-indigo-50 text-sm opacity-90 font-bold mt-1">Hands-on creation and mechanical logic</p>
                          </div>
                          <div className="bg-white/20 p-4 rounded-full group-hover:scale-110 transition-all shadow-md backdrop-blur-md">
                            <Youtube size={36} />
                          </div>
                        </div>
                      </div>
                    </section>

                  </div>

                  <aside className="lg:w-1/5">
                    {/* Square Sidebar Ad */}
                    <div className="sticky top-24 z-10">
                      <AdBanner format="square" />
                    </div>
                  </aside>
                </main>

                <footer className="bg-gray-900 text-white py-20 text-center mt-12">
                  <div className="max-w-7xl mx-auto px-4">
                    <div className="flex items-center justify-center mb-10 text-3xl font-black tracking-tighter uppercase">
                      MachiKnow
                    </div>
                    <div className="pt-10 border-t border-gray-800 text-gray-600 text-[9px] font-black tracking-[0.5em] uppercase">© 2026 MachiKnow. All rights reserved.</div>
                  </div>
                </footer>
              </div>
            </div>
          );
        }

        // Render the App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
