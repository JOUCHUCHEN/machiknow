<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Grabber</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        // 全站預設改為 Roboto
                        sans: ['"Roboto"', 'sans-serif'],
                        // 保留給 MaachiiKnow 使用的品牌字體
                        brand: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '3rem',
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            font-family: 'Roboto', sans-serif;
            overflow: hidden; /* 防止整個網頁出現預設滾動條，讓滾動條只出現在內容區 */
        }
        
        /* 滾動條樣式優化 */
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f8fafc; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 防止 iframe 被圓角切掉 */
        .video-container {
            mask-image: radial-gradient(white, black);
            -webkit-mask-image: -webkit-radial-gradient(white, black);
        }

        #root {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- 簡易 Lucide 圖示組件 ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const AdBanner = ({ format = 'horizontal', className = "" }) => (
          <div className={`relative flex items-center justify-center bg-gray-50 border-2 border-dashed border-gray-200 text-gray-400 rounded-2xl overflow-hidden ${format === 'horizontal' ? 'w-full h-20 my-2' : 'w-full aspect-square max-h-[250px] my-4'} ${className}`}>
            <span className="absolute top-2 right-3 text-[9px] bg-gray-100 text-gray-400 px-1.5 py-0.5 rounded uppercase tracking-widest font-bold">AD Space</span>
            <p className="font-bold text-xs opacity-50">{format === 'horizontal' ? '728 x 90' : '300 x 250'}</p>
          </div>
        );

        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const bilibiliUrl = "https://www.bilibili.com/video/BV12gDjB7ELB/";
          const downloadUrl = "https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/steam/autograbber/Auto_Grabber.io";
          const handleNavAction = () => {
            window.top.location.href = '../../index.html';
            setIsMobileMenuOpen(false);
          };

          return (
            <div className="flex flex-col h-screen font-sans">
              {/* 導覽列 (移除 sticky，因為外層已固定高度) */}
              <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50">
                <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                  <div className="flex items-center cursor-pointer group" onClick={handleNavAction}>
                    <img 
                      src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                      alt="MaachiiKnow Logo" 
                      className="w-16 h-16 object-contain group-hover:scale-110 group-hover:rotate-6 transition-all relative -top-1 left-0 z-0"
                    />
                    <span className="font-black text-3xl text-gray-900 tracking-tighter relative z-10 ml-0 font-brand">
                      Maachii<span className="text-orange-600">Know</span>
                    </span>
                  </div>
                  <div className="hidden md:flex items-center space-x-12">
                    <button onClick={handleNavAction} className="font-bold text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors">Home</button>
                  </div>
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2">
                    <Icon name={isMobileMenuOpen ? "x" : "menu"} size={28} />
                  </button>
                </div>
                
                {isMobileMenuOpen && (
                  <div className="absolute top-20 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40">
                    <button onClick={handleNavAction} className="text-left font-bold text-gray-700">Home</button>
                  </div>
                )}
              </nav>

              {/* 內容區塊 (滾動條會限制在這裡面) */}
              <div className="flex-1 overflow-y-auto custom-scroll">
                <main className="w-full">
                    <div className="p-6 lg:p-10 max-w-6xl mx-auto w-full flex flex-col">
                        
                        {/* Header 區塊 */}
                        <div className="mb-10 text-left">
                            <h2 className="text-3xl sm:text-4xl lg:text-5xl font-black text-slate-900 tracking-tight mb-3">LEGO 9686 SPM: Auto Grabber</h2>
                            <div className="flex items-center justify-start gap-2 text-slate-400 font-bold tracking-wider uppercase text-xs">
                                <Icon name="play-circle" size={14} className="text-orange-500" />
                                <span>STEAM Project Learning</span>
                                <span className="text-slate-200 mx-1">•</span>
                                <span className="text-indigo-600 font-bold">Creative Engineering Design</span>
                            </div>
                        </div>

                        {/* Video Frame (Bilibili) */}
                        <div className="w-full relative group">
                            <div className="absolute -inset-1 bg-gradient-to-r from-orange-500 to-rose-500 rounded-[3rem] blur opacity-15 group-hover:opacity-25 transition duration-1000"></div>
                            <div className="relative bg-white p-3 md:p-4 rounded-[3.5rem] shadow-2xl border border-slate-100">
                                <div className="aspect-video w-full bg-slate-900 rounded-[2.5rem] overflow-hidden relative shadow-inner video-container">
                                    <iframe src="//player.bilibili.com/player.html?isOutside=true&aid=116373615417961&bvid=BV1sbDsBMEob&cid=37359782457&p=1" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe>
                                </div>
                            </div>
                        </div>

                        {/* 按鈕區域 */}
                        <div className="mt-12 flex flex-col items-center gap-6">
                          <div className="flex flex-col sm:flex-row items-center gap-4 w-full justify-center">
                            {/* Bilibili 按鈕 */}
                            <a 
                              href={bilibiliUrl} 
                              target="_blank" 
                              rel="noopener noreferrer"
                              className="flex items-center gap-3 text-base font-bold text-white px-8 py-4 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 rounded-full shadow-[0_10px_30px_-10px_rgba(59,130,246,0.4)] transition-all hover:scale-105 active:scale-95 group w-full sm:w-auto justify-center"
                            >
                              <Icon name="tv" size={20} className="group-hover:animate-pulse" /> 
                              Watch on Bilibili 
                              <Icon name="external-link" size={16} className="opacity-70" />
                            </a>

                            {/* 下載按鈕 */}
                            <a 
                              href={downloadUrl} 
                              target="_blank" 
                              rel="noopener noreferrer"
                              download="Auto_Grabber.io"
                              className="flex items-center gap-3 text-base font-bold text-white px-8 py-4 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 rounded-full shadow-[0_10px_30px_-10px_rgba(16,185,129,0.4)] transition-all hover:scale-105 active:scale-95 group w-full sm:w-auto justify-center"
                            >
                              <Icon name="download" size={20} className="group-hover:bounce" /> 
                              Download .io File
                              <Icon name="file-down" size={16} className="opacity-70" />
                            </a>
                          </div>

                          <div className="flex items-center gap-2 text-rose-500 text-[10px] font-black uppercase tracking-[0.3em] bg-rose-50 px-3 py-1 rounded-full">
                            <Icon name="alert-circle" size={12} className="stroke-[3]" /> Playback or Download Issues?
                          </div>
                        </div>

                        {/* 資訊 */}
                        <div className="mt-16 mb-20 grid grid-cols-1 lg:grid-cols-3 gap-8">
                          <div className="lg:col-span-2 bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm relative overflow-hidden group">
                             <div className="absolute top-0 right-0 p-8 opacity-[0.03] group-hover:scale-110 transition-transform duration-700">
                                <Icon name="lightbulb" size={120} className="text-orange-600" />
                             </div>
                             <h3 className="font-black text-2xl mb-6 flex items-center gap-3 text-orange-600 tracking-tight">
                               <span className="p-2 bg-orange-50 rounded-xl"><Icon name="lightbulb" className="text-orange-600" size={24} /></span>
                               Project Overview
                             </h3>
                             <p className="text-slate-600 leading-loose text-lg font-medium relative z-10">
                               In this lesson, we will learn how to build a motorized mechanical frog using the Lego 9686 set! Through hands-on practice, students will explore gear transmission, motorized mechanisms, and the structural design needed to convert rotational motion into a walking action. Join us as we bring engineering principles to life!
                             </p>
                          </div>
                          <div className="flex flex-col">
                             <AdBanner format="square" className="!my-0 w-full h-full min-h-[300px] border-slate-200" />
                          </div>
                        </div>
                    </div>
                </main>

                  <footer className="bg-gray-900 text-white py-12 text-center shrink-0">
                    <div className="max-w-7xl mx-auto px-4">
                      <div className="brand-font flex items-center justify-center mb-6 text-2xl tracking-tighter uppercase">
                        MaachiiKnow
                      </div>
                      <div className="pt-6 border-t border-gray-800 text-gray-600 text-[9px] font-black tracking-[0.5em] uppercase">© 2026 MaachiiKnow. All rights reserved.</div>
                    </div>
                  </footer>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
