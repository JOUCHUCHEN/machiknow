<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Book - MaachiiKnow</title>
    
    <!-- 引入 Noto Sans TC (Logo使用) 與 Roboto (全站使用) 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        logo: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- UI 所需的自訂 CSS -->
    <style>
        body { font-family: 'Roboto', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        @keyframes bounce-slow { 
          0%, 100% { transform: translateY(-5%); } 
          50% { transform: translateY(0); } 
        }
        .animate-bounce-slow { animation: bounce-slow 3s infinite; }
    </style>

    <!-- Import Maps -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden">
    <!-- React 應用的掛載點 -->
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, ArrowLeft, Menu, X, Volume2 } from 'lucide-react';

        const TEXTURES = [
          { id: 'scales', name: 'Scales', adjectives: 'Hard and shiny', color: 'bg-emerald-100', borderColor: 'border-emerald-400', textColor: 'text-emerald-700', icon: '🐍' },
          { id: 'feathers', name: 'Feathers', adjectives: 'Soft and light', color: 'bg-rose-100', borderColor: 'border-rose-400', textColor: 'text-rose-700', icon: '🐦' },
          { id: 'fur', name: 'Fur', adjectives: 'Warm and thick', color: 'bg-amber-100', borderColor: 'border-amber-400', textColor: 'text-amber-700', icon: '🦁' },
          { id: 'smooth', name: 'Smooth Skin', adjectives: 'Thick and wet/smooth', color: 'bg-cyan-100', borderColor: 'border-cyan-400', textColor: 'text-cyan-700', icon: '🐬' }
        ];

        const ANIMALS = [
          { id: 'snake', name: 'Snake', texture: 'scales', emoji: '🐍' }, 
          { id: 'fish', name: 'Fish', texture: 'scales', emoji: '🐟' }, 
          { id: 'crocodile', name: 'Crocodile', texture: 'scales', emoji: '🐊' },
          { id: 'eagle', name: 'Eagle', texture: 'feathers', emoji: '🦅' }, 
          { id: 'crow', name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛' }, 
          { id: 'parrot', name: 'Parrot', texture: 'feathers', emoji: '🦜' },
          { id: 'dog', name: 'Dog', texture: 'fur', emoji: '🐶' }, 
          { id: 'lion', name: 'Lion', texture: 'fur', emoji: '🦁' }, 
          { id: 'horse', name: 'Horse', texture: 'fur', emoji: '🐴' },
          { id: 'whale', name: 'Whale', texture: 'smooth', emoji: '🐳' }, 
          { id: 'seal', name: 'Seal', texture: 'smooth', emoji: '🦭' }, 
          { id: 'elephant', name: 'Elephant', texture: 'smooth', emoji: '🐘' }
        ];

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        function App() {
          const [selectedTexture, setSelectedTexture] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          // 導航至首頁 (Navbar 使用)
          const navigateToHome = () => {
            window.location.href = 'index.html';
          };

          // 導航至質地介紹頁 (內容頁 Back 使用)
          const navigateToEnglishTexture = () => {
            window.location.href = 'english_texture.html';
          };

          // --- Navbar Component ---
          const Navbar = () => (
            <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                {/* Logo 點擊回到 index.html */}
                <div className="flex items-center cursor-pointer group" onClick={navigateToHome}>
                  <img 
                      src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                      alt="Maachiiknow Logo" 
                      className="w-16 h-16 object-contain group-hover:scale-110 group-hover:rotate-6 transition-all relative -top-1 left-0 z-0"
                   />
                   <span className="font-logo font-black text-3xl text-gray-900 tracking-tighter relative z-10 ml-0">
                     Maachii<span className="text-orange-600">Know</span>
                   </span>
                </div>
                
                <div className="hidden md:flex items-center space-x-12">
                  {/* Home 按鈕點擊回到 index.html */}
                  <button 
                    onClick={navigateToHome} 
                    className="font-bold text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors"
                  >
                    Home
                  </button>
                </div>

                <button 
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                  className="md:hidden text-gray-600 p-2"
                >
                  {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                </button>
              </div>
              
              {isMobileMenuOpen && (
                <div className="absolute top-20 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40 animate-in slide-in-from-top-2 duration-300">
                  <button 
                    onClick={navigateToHome} 
                    className="text-left font-bold text-gray-700"
                  >
                    Home
                  </button>
                </div>
              )}
            </nav>
          );

          return (
            <div className="min-h-screen bg-sky-50 flex flex-col h-screen overflow-hidden">
                <Navbar />

                <main className="flex-1 overflow-y-auto overflow-x-hidden relative custom-scroll p-4 md:p-6">
                  <div className="max-w-7xl mx-auto h-full">
                    
                    {/* Header & Content Back Button - 回到 english_texture.html */}
                    <div className="flex items-center justify-between mb-8 bg-white p-3 rounded-3xl shadow-sm border border-sky-100">
                      <button 
                        onClick={() => selectedTexture ? setSelectedTexture(null) : navigateToEnglishTexture()} 
                        className="p-3 text-orange-600 hover:bg-orange-50 rounded-2xl transition-all shadow-sm active:scale-90"
                      >
                        <ArrowLeft size={28} />
                      </button>
                      <h2 className="text-2xl sm:text-3xl font-black text-slate-800 flex items-center gap-3">
                        <BookOpen className="text-emerald-500" /> Texture Book
                      </h2>
                      <div className="w-12"></div>
                    </div>

                    {!selectedTexture ? (
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto animate-in fade-in slide-in-from-bottom-4">
                        {TEXTURES.map((t) => (
                          <button key={t.id} onClick={() => { setSelectedTexture(t); speak(t.name); }} className={`${t.color} ${t.borderColor} border-4 p-8 rounded-[3rem] shadow-sm hover:shadow-xl transform transition hover:-translate-y-2 flex flex-col items-center justify-center gap-4 group`}>
                            <div className="text-8xl group-hover:scale-110 transition duration-300">{t.icon}</div>
                            <h3 className={`text-4xl sm:text-5xl font-black ${t.textColor}`}>{t.name}</h3>
                            <p className={`text-xl font-bold opacity-75 ${t.textColor} uppercase tracking-widest`}>Gallery</p>
                          </button>
                        ))}
                      </div>
                    ) : (
                      <div className="bg-white rounded-[3.5rem] p-6 sm:p-12 border-4 shadow-xl text-center relative max-w-5xl mx-auto animate-in zoom-in duration-300" style={{ borderColor: selectedTexture.borderColor }}>
                        <button onClick={() => setSelectedTexture(null)} className="absolute top-6 left-6 text-slate-400 hover:text-slate-700 bg-slate-50 p-3 rounded-full transition-colors">
                          <ArrowLeft />
                        </button>
                        <div className="text-[8rem] sm:text-[10rem] mb-6 animate-bounce-slow">{selectedTexture.icon}</div>
                        <h3 className={`text-5xl sm:text-6xl font-black mb-4 ${selectedTexture.textColor}`}>{selectedTexture.name}</h3>
                        <div className={`inline-block px-8 py-3 rounded-full text-xl sm:text-2xl font-bold mb-10 ${selectedTexture.color} ${selectedTexture.textColor}`}>
                          {selectedTexture.adjectives}
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 sm:gap-6">
                          {ANIMALS.filter(a => a.texture === selectedTexture.id).map(animal => (
                            <div 
                              key={animal.id} 
                              className="bg-slate-50 p-6 rounded-[2rem] border-2 border-transparent hover:border-sky-400 transition cursor-pointer flex flex-col items-center" 
                              onClick={() => speak(`A ${animal.name} has ${selectedTexture.name.toLowerCase()}`)}
                            >
                              <div className="text-6xl sm:text-7xl mb-4 transform hover:scale-110 transition-transform">{animal.emoji}</div>
                              <div className="text-xl sm:text-2xl font-black text-slate-800 tracking-tighter">{animal.name}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                </main>

                <footer className="bg-white/80 backdrop-blur-sm border-t py-4 text-center shrink-0">
                  <p className="text-[10px] text-gray-400 font-black uppercase tracking-[0.3em]">
                    © 2026 MaachiiKnow. All rights reserved.
                  </p>
                </footer>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
