<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Book - MaachiiKnow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-sans { font-family: 'Roboto', sans-serif; }
        .font-logo { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
        @keyframes bounce-slow { 
          0%, 100% { transform: translateY(-5%); } 
          50% { transform: translateY(0); } 
        }
        .animate-bounce-slow { animation: bounce-slow 3s infinite; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden font-sans">
    <div id="root" class="h-full"></div>
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, ArrowLeft, Menu, X, Volume2 } from 'lucide-react';

        const TEXTURES = [
          { id: 'scales', name: 'Scales', adjectives: 'Hard and shiny', color: 'bg-emerald-100', borderColor: 'border-emerald-400', textColor: 'text-emerald-700', icon: '🐍' },
          { id: 'feathers', name: 'Feathers', adjectives: 'Soft and light', color: 'bg-rose-100', borderColor: 'border-rose-400', textColor: 'text-rose-700', icon: '🐦' },
          { id: 'fur', name: 'Fur', adjectives: 'Warm and thick', color: 'bg-amber-100', borderColor: 'border-amber-400', textColor: 'text-amber-700', icon: '🦁' },
          { id: 'smooth', name: 'Smooth Skin', adjectives: 'Thick and wet/smooth', color: 'bg-cyan-100', borderColor: 'border-cyan-400', textColor: 'text-cyan-700', icon: '🐬' }
        ];

        const ANIMALS = [
          { id: 'snake', name: 'Snake', texture: 'scales', emoji: '🐍' }, { id: 'fish', name: 'Fish', texture: 'scales', emoji: '🐟' }, { id: 'crocodile', name: 'Crocodile', texture: 'scales', emoji: '🐊' },
          { id: 'eagle', name: 'Eagle', texture: 'feathers', emoji: '🦅' }, { id: 'crow', name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛' }, { id: 'parrot', name: 'Parrot', texture: 'feathers', emoji: '🦜' },
          { id: 'dog', name: 'Dog', texture: 'fur', emoji: '🐶' }, { id: 'lion', name: 'Lion', texture: 'fur', emoji: '🦁' }, { id: 'horse', name: 'Horse', texture: 'fur', emoji: '🐴' },
          { id: 'whale', name: 'Whale', texture: 'smooth', emoji: '🐳' }, { id: 'seal', name: 'Seal', texture: 'smooth', emoji: '🦭' }, { id: 'elephant', name: 'Elephant', texture: 'smooth', emoji: '🐘' }
        ];

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        function App() {
          const [selectedTexture, setSelectedTexture] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          return (
            <div className="flex flex-col h-full">
              {/* Navbar */}
              <nav className="bg-white shadow-sm h-20 border-b shrink-0 z-50 sticky top-0">
                <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                  <div className="flex items-center cursor-pointer group" onClick={() => window.location.href='english_texture.html'}>
                    <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="Logo" className="w-16 h-16 group-hover:rotate-6 transition-all" />
                    <span className="font-logo font-black text-3xl text-gray-900 tracking-tighter">Maachii<span className="text-orange-600">Know</span></span>
                  </div>
                  <button onClick={() => window.location.href='english_texture.html'} className="hidden md:block font-bold text-gray-500 hover:text-orange-600 tracking-widest uppercase transition-colors">Home</button>
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2">{isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}</button>
                </div>
              </nav>

              <main className="flex-1 overflow-y-auto relative custom-scroll p-4 md:p-6">
                <div className="max-w-7xl mx-auto h-full animate-in slide-in-from-right">
                  {/* Header & Back Button Logic */}
                  <div className="flex items-center justify-between mb-8 bg-white p-4 rounded-3xl shadow-sm border">
                    <button 
                      onClick={() => selectedTexture ? setSelectedTexture(null) : window.location.href='english_texture.html'} 
                      className="flex items-center gap-2 text-slate-500 hover:text-sky-600 font-bold px-4 py-2 rounded-xl hover:bg-slate-50 transition"
                    >
                      <ArrowLeft /> Back
                    </button>
                    <h2 className="text-3xl font-black text-slate-800 flex items-center gap-3"><BookOpen className="text-emerald-500" /> Texture Book</h2>
                    <div className="w-24"></div>
                  </div>

                  {!selectedTexture ? (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                      {TEXTURES.map((t) => (
                        <button key={t.id} onClick={() => { setSelectedTexture(t); speak(t.name); }} className={`${t.color} ${t.borderColor} border-4 p-8 rounded-[3rem] shadow-sm hover:shadow-xl transform transition hover:-translate-y-2 flex flex-col items-center justify-center gap-4 group`}>
                          <div className="text-8xl group-hover:scale-110 transition duration-300">{t.icon}</div>
                          <h3 className={`text-5xl font-black ${t.textColor}`}>{t.name}</h3>
                          <p className={`text-xl font-bold opacity-75 ${t.textColor}`}>Gallery</p>
                        </button>
                      ))}
                    </div>
                  ) : (
                    <div className="bg-white rounded-[3.5rem] p-10 border-4 shadow-xl text-center relative max-w-5xl mx-auto" style={{ borderColor: selectedTexture.borderColor }}>
                      <button onClick={() => setSelectedTexture(null)} className="absolute top-8 left-8 text-slate-400 hover:text-slate-700 bg-slate-50 p-3 rounded-full"><ArrowLeft /></button>
                      <div className="text-[10rem] mb-6 animate-bounce-slow">{selectedTexture.icon}</div>
                      <h3 className={`text-6xl font-black mb-4 ${selectedTexture.textColor}`}>{selectedTexture.name}</h3>
                      <div className={`inline-block px-8 py-3 rounded-full text-2xl font-bold mb-10 ${selectedTexture.color} ${selectedTexture.textColor}`}>{selectedTexture.adjectives}</div>
                      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                        {ANIMALS.filter(a => a.texture === selectedTexture.id).map(animal => (
                          <div key={animal.id} className="bg-slate-50 p-6 rounded-[2rem] border hover:border-sky-400 transition cursor-pointer" onClick={() => speak(`A ${animal.name} has ${selectedTexture.name.toLowerCase()}`)}>
                            <div className="text-7xl mb-4">{animal.emoji}</div>
                            <div className="text-2xl font-black text-slate-800 tracking-tighter">{animal.name}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
