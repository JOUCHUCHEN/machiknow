<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Lab - MaachiiKnow</title>
    
    <!-- 引入 Noto Sans TC (Logo使用) 與 Roboto (全站使用) 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        logo: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- UI 所需的自訂 CSS -->
    <style>
        body { font-family: 'Roboto', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        
        .matched-scales { border-color: #22c55e !important; background-color: #dcfce7 !important; opacity: 0.3; transform: scale(0.9); pointer-events: none; }
        .matched-feathers { border-color: #ef4444 !important; background-color: #fee2e2 !important; opacity: 0.3; transform: scale(0.9); pointer-events: none; }
        .matched-fur { border-color: #a855f7 !important; background-color: #f3e8ff !important; opacity: 0.3; transform: scale(0.9); pointer-events: none; }
        .matched-smooth { border-color: #eab308 !important; background-color: #fef9c3 !important; opacity: 0.3; transform: scale(0.9); pointer-events: none; }

        @keyframes bounce-custom { 
          0%, 100% { transform: translateY(0); } 
          50% { transform: translateY(-10px); } 
        }
        .animate-bounce-custom { animation: bounce-custom 0.4s ease-out; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.3s; }
    </style>

    <!-- Import Maps -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden">
    <!-- React 應用的掛載點 -->
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, ArrowLeft, Menu, X, RotateCcw } from 'lucide-react';

        const TEXTURES = [
          { id: 'scales', name: 'Scales', adjectives: 'Hard and shiny', color: 'bg-emerald-50', borderColor: 'border-emerald-200', textColor: 'text-emerald-700', activeRing: 'ring-emerald-400', icon: '🟢' },
          { id: 'feathers', name: 'Feathers', adjectives: 'Soft and light', color: 'bg-rose-50', borderColor: 'border-rose-200', textColor: 'text-rose-700', activeRing: 'ring-rose-400', icon: '🔴' },
          { id: 'fur', name: 'Fur', adjectives: 'Warm and thick', color: 'bg-purple-50', borderColor: 'border-purple-200', textColor: 'text-purple-700', activeRing: 'ring-purple-400', icon: '🟣' },
          { id: 'smooth', name: 'Smooth Skin', adjectives: 'Thick and wet/smooth', color: 'bg-amber-50', borderColor: 'border-amber-200', textColor: 'text-amber-700', activeRing: 'ring-amber-400', icon: '🟡' }
        ];

        const ANIMALS_DATA = [
          { id: 1, name: 'Snake', texture: 'scales', emoji: '🐍' }, 
          { id: 2, name: 'Fish', texture: 'scales', emoji: '🐟' }, 
          { id: 3, name: 'Crocodile', texture: 'scales', emoji: '🐊' },
          { id: 4, name: 'Eagle', texture: 'feathers', emoji: '🦅' }, 
          { id: 5, name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛' }, 
          { id: 6, name: 'Parrot', texture: 'feathers', emoji: '🦜' },
          { id: 7, name: 'Dog', texture: 'fur', emoji: '🐶' }, 
          { id: 8, name: 'Lion', texture: 'fur', emoji: '🦁' }, 
          { id: 9, name: 'Horse', texture: 'fur', emoji: '🐴' },
          { id: 10, name: 'Whale', texture: 'smooth', emoji: '🐳' }, 
          { id: 11, name: 'Seal', texture: 'smooth', emoji: '🦭' }, 
          { id: 12, name: 'Elephant', texture: 'smooth', emoji: '🐘' }
        ];

        function App() {
          const [selectedTexture, setSelectedTexture] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [score, setScore] = useState(0);
          const [matchedIds, setMatchedIds] = useState(new Set());
          const [shuffledAnimals, setShuffledAnimals] = useState([]);
          const [message, setMessage] = useState("");
          const [shakeId, setShakeId] = useState(null);

          useEffect(() => {
            resetGame();
          }, []);

          const resetGame = () => {
            setScore(0);
            setMatchedIds(new Set());
            setSelectedTexture(null);
            setShuffledAnimals([...ANIMALS_DATA].sort(() => Math.random() - 0.5));
            setMessage("");
          };

          const navigateToHome = () => { window.location.href = '/index.html'; };
          const navigateToEnglishTexture = () => { window.location.href = '/english_texture.html'; };

          const showFeedback = (text) => {
            setMessage(text);
            setTimeout(() => setMessage(""), 1500);
          };

          const handleAnimalClick = (animal) => {
            if (!selectedTexture) {
              showFeedback("Pick a texture first! ⬅️");
              return;
            }
            if (matchedIds.has(animal.id)) return;

            if (animal.texture === selectedTexture.id) {
              const newMatched = new Set(matchedIds);
              newMatched.add(animal.id);
              setMatchedIds(newMatched);
              setScore(prev => prev + 1);
              showFeedback("Good! ✅");

              if (newMatched.size === ANIMALS_DATA.length) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                showFeedback("Great Job! 🏆");
              }
            } else {
              setShakeId(animal.id);
              setTimeout(() => setShakeId(null), 300);
              showFeedback("Try again! ❌");
            }
          };

          // --- Navbar Component ---
          const Navbar = () => (
            <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                <div className="flex items-center cursor-pointer group" onClick={navigateToHome}>
                  <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="Maachiiknow Logo" className="w-16 h-16 object-contain group-hover:scale-110 group-hover:rotate-6 transition-all relative -top-1 z-0" />
                  <span className="font-logo font-black text-3xl text-gray-900 tracking-tighter ml-0">
                    Maachii<span className="text-orange-600">Know</span>
                  </span>
                </div>
                <div className="hidden md:flex items-center space-x-12">
                  <button onClick={navigateToHome} className="font-bold text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors">Home</button>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2">
                  {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                </button>
              </div>
              {isMobileMenuOpen && (
                <div className="absolute top-20 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40">
                  <button onClick={navigateToHome} className="text-left font-bold text-gray-700">Home</button>
                </div>
              )}
            </nav>
          );

          return (
            <div className="min-h-screen bg-sky-50 flex flex-col h-screen overflow-hidden">
                <Navbar />

                <main className="flex-grow flex flex-col overflow-hidden p-4 md:p-6 min-h-0">
                    {/* Header with Back Button */}
                    <div className="flex items-center justify-between mb-4 bg-white p-3 rounded-3xl shadow-sm border border-sky-100 shrink-0">
                      <button 
                        onClick={() => selectedTexture ? setSelectedTexture(null) : navigateToEnglishTexture()} 
                        className="p-3 text-orange-600 hover:bg-orange-50 rounded-2xl transition-all shadow-sm active:scale-90"
                      >
                        <ArrowLeft size={28} />
                      </button>
                      <h2 className="text-2xl font-black text-slate-800 flex items-center gap-3">
                        <BookOpen className="text-emerald-500" /> Texture Lab
                      </h2>
                      <div className="w-12"></div>
                    </div>

                    {/* Game Content Area */}
                    <div className="flex-grow flex flex-row gap-4 min-h-0 overflow-hidden">
                        
                        {/* Left Side: Textures */}
                        <aside className="w-1/4 min-w-[180px] max-w-[220px] bg-white border border-slate-200 rounded-[2rem] flex flex-col p-4 shadow-sm shrink-0">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">1. Select Texture</h3>
                            <div className="flex-grow flex flex-col gap-2 no-scrollbar">
                                {TEXTURES.map(t => (
                                    <button 
                                        key={t.id}
                                        onClick={() => setSelectedTexture(t)}
                                        className={`w-full py-3 px-3 rounded-xl font-bold transition-all text-left flex justify-between items-center text-xs border-2 
                                            ${selectedTexture?.id === t.id ? `ring-4 ${t.activeRing} bg-white border-transparent scale-105` : `${t.color} ${t.borderColor} border-transparent`}
                                        `}
                                    >
                                        {t.name} <span>{t.icon}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="mt-auto pt-4 border-t border-slate-100">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <div className="text-[9px] text-slate-400 font-black uppercase">Score</div>
                                        <div className="text-2xl font-black text-blue-600 tracking-tighter leading-none">{score}/12</div>
                                    </div>
                                    <button onClick={resetGame} className="bg-slate-50 hover:bg-red-50 hover:text-red-500 text-slate-400 p-2 rounded-xl transition-all">
                                        <RotateCcw size={16} />
                                    </button>
                                </div>
                            </div>
                        </aside>

                        {/* Right Side: Animal Grid */}
                        <section className="flex-grow flex flex-col min-w-0">
                            <div className="flex items-center justify-between mb-3 px-1 shrink-0">
                                <h3 className="text-[9px] font-black text-slate-400 uppercase tracking-widest">2. Match the Animals</h3>
                                <div className="px-4 py-1.5 bg-white text-blue-500 rounded-full text-[10px] font-black shadow-sm border border-blue-100 uppercase tracking-widest">
                                    {selectedTexture ? `Finding: ${selectedTexture.name}` : "Pick a texture first"}
                                </div>
                            </div>
                            
                            <div className="flex-grow min-h-0">
                                <div className="grid grid-cols-4 grid-rows-3 gap-2 h-full w-full">
                                    {shuffledAnimals.map(animal => {
                                        const isMatched = matchedIds.has(animal.id);
                                        const isShaking = shakeId === animal.id;
                                        
                                        return (
                                            <div 
                                                key={animal.id}
                                                onClick={() => handleAnimalClick(animal)}
                                                className={`bg-white rounded-2xl shadow-sm cursor-pointer flex flex-col items-center justify-center transition-all duration-300 border-2 border-transparent h-full relative min-h-0 group
                                                    ${isMatched ? `matched-${animal.texture}` : 'hover:shadow-md'}
                                                    ${isShaking ? 'animate-shake' : ''}
                                                `}
                                            >
                                                <div className="flex-grow flex items-center justify-center w-full min-h-0">
                                                    <span className={`text-4xl lg:text-5xl group-hover:scale-110 transition-transform select-none ${isMatched ? 'animate-bounce-custom' : ''}`}>
                                                        {animal.emoji}
                                                    </span>
                                                </div>
                                                <div className="pb-2 bg-white text-center shrink-0 w-full rounded-b-2xl">
                                                    <span className="font-bold text-slate-500 text-[9px] uppercase tracking-tighter">{animal.name}</span>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </section>
                    </div>
                </main>

                {/* Feedback Message */}
                {message && (
                  <div className="fixed top-24 left-1/2 -translate-x-1/2 px-6 py-2 bg-white rounded-full shadow-lg border-2 border-blue-500 font-bold text-sm z-[60] animate-in fade-in zoom-in duration-200">
                    {message}
                  </div>
                )}

                <footer className="bg-white/80 backdrop-blur-sm border-t py-4 text-center shrink-0">
                  <p className="text-[10px] text-gray-400 font-black uppercase tracking-[0.3em]">
                    © 2026 MaachiiKnow. All rights reserved.
                  </p>
                </footer>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
