<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Lab - MaachiiKnow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-sans { font-family: 'Roboto', sans-serif; }
        .font-logo { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden font-sans">
    <div id="root" class="h-full"></div>
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { ArrowLeft, Menu, X, RotateCcw, CheckCircle2 } from 'lucide-react';

        const TEXTURES = [
          { id: 'scales', name: 'Scales', color: 'bg-emerald-100', borderColor: 'border-emerald-400', textColor: 'text-emerald-700', icon: '🐍', activeRing: 'ring-emerald-400' },
          { id: 'feathers', name: 'Feathers', color: 'bg-rose-100', borderColor: 'border-rose-400', textColor: 'text-rose-700', icon: '🐦', activeRing: 'ring-rose-400' },
          { id: 'fur', name: 'Fur', color: 'bg-amber-100', borderColor: 'border-amber-400', textColor: 'text-amber-700', icon: '🦁', activeRing: 'ring-amber-400' },
          { id: 'smooth', name: 'Smooth Skin', color: 'bg-cyan-100', borderColor: 'border-cyan-400', textColor: 'text-cyan-700', icon: '🐬', activeRing: 'ring-cyan-400' }
        ];

        const ANIMALS = [
          { id: 'snake', name: 'Snake', texture: 'scales', emoji: '🐍' }, { id: 'fish', name: 'Fish', texture: 'scales', emoji: '🐟' }, { id: 'crocodile', name: 'Crocodile', texture: 'scales', emoji: '🐊' },
          { id: 'eagle', name: 'Eagle', texture: 'feathers', emoji: '🦅' }, { id: 'crow', name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛' }, { id: 'parrot', name: 'Parrot', texture: 'feathers', emoji: '🦜' },
          { id: 'dog', name: 'Dog', texture: 'fur', emoji: '🐶' }, { id: 'lion', name: 'Lion', texture: 'fur', emoji: '🦁' }, { id: 'horse', name: 'Horse', texture: 'fur', emoji: '🐴' },
          { id: 'whale', name: 'Whale', texture: 'smooth', emoji: '🐳' }, { id: 'seal', name: 'Seal', texture: 'smooth', emoji: '🦭' }, { id: 'elephant', name: 'Elephant', texture: 'smooth', emoji: '🐘' }
        ];

        const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [labSelectedType, setLabSelectedType] = useState(null);
          const [labMatchedIds, setLabMatchedIds] = useState(new Set());
          const [shuffledLabAnimals, setShuffledLabAnimals] = useState([]);

          const initLab = () => {
            setShuffledLabAnimals(shuffleArray(ANIMALS));
            setLabMatchedIds(new Set());
            setLabSelectedType(null);
          };

          useEffect(() => { initLab(); }, []);

          const handleLabGuess = (animal) => {
            if (!labSelectedType) { speak("Pick a texture first!"); return; }
            if (labMatchedIds.has(animal.id)) return;
            if (animal.texture === labSelectedType.id) {
              const newMatched = new Set(labMatchedIds);
              newMatched.add(animal.id);
              setLabMatchedIds(newMatched);
              speak(`Good! ${animal.name} has ${labSelectedType.name}.`);
            } else {
              speak("Try again!");
            }
          };

          return (
            <div className="flex flex-col h-full">
              <nav className="bg-white shadow-sm h-20 border-b shrink-0 z-50 sticky top-0">
                <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                  <div className="flex items-center cursor-pointer group" onClick={() => window.location.href='index.html'}>
                    <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="Logo" className="w-16 h-16 group-hover:rotate-6 transition-all" />
                    <span className="font-logo font-black text-3xl text-gray-900 tracking-tighter">Maachii<span className="text-orange-600">Know</span></span>
                  </div>
                  <button onClick={() => window.location.href='index.html'} className="hidden md:block font-bold text-gray-500 hover:text-orange-600 tracking-widest uppercase transition-colors">Home</button>
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2">{isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}</button>
                </div>
              </nav>

              <main className="flex-1 overflow-y-auto relative custom-scroll p-4 md:p-6">
                <div className="max-w-7xl mx-auto h-full animate-in slide-in-from-right flex flex-col md:flex-row gap-6">
                  <aside className="w-full md:w-1/4 bg-white rounded-[2.5rem] p-6 shadow-xl border flex flex-col shrink-0">
                    <button onClick={() => window.location.href='index.html'} className="flex items-center gap-2 text-slate-400 hover:text-sky-600 font-bold mb-6"><ArrowLeft size={20} /> Back</button>
                    <h2 className="text-xl font-black text-sky-800 uppercase italic leading-none text-center">Texture Lab</h2>
                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1 mb-6 text-center">1. Select Texture</p>
                    <div className="space-y-3 flex-grow overflow-y-auto no-scrollbar">
                      {TEXTURES.map(t => (
                        <button key={t.id} onClick={() => { setLabSelectedType(t); speak(`Find ${t.name}`); }} className={`w-full py-4 px-4 rounded-2xl font-black text-left flex justify-between items-center transition-all border-2 ${labSelectedType?.id === t.id ? `${t.activeRing} ring-4 bg-white shadow-md scale-105` : `${t.color} border-transparent opacity-80 hover:opacity-100`}`}>
                          <span className={t.textColor}>{t.name}</span><span>{t.icon}</span>
                        </button>
                      ))}
                    </div>
                    <div className="mt-6 pt-6 border-t flex justify-between items-center">
                      <div><p className="text-[10px] text-slate-400 font-bold uppercase">Score</p><p className="text-3xl font-black text-sky-600">{labMatchedIds.size}/12</p></div>
                      <button onClick={initLab} className="p-3 bg-slate-100 hover:bg-rose-100 hover:text-rose-500 rounded-2xl transition-colors"><RotateCcw size={24} /></button>
                    </div>
                  </aside>

                  <div className="flex-grow flex flex-col min-w-0">
                    <div className="flex items-center justify-between mb-4 px-2">
                      <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">2. Match the Animals</h2>
                      <div className={`px-4 py-2 rounded-full text-xs font-black shadow-sm border transition-all ${labSelectedType ? `${labSelectedType.color} ${labSelectedType.textColor} border-current animate-pulse` : 'bg-white text-slate-400'}`}>{labSelectedType ? `FIND: ${labSelectedType.name.toUpperCase()}` : 'PICK A TEXTURE FIRST'}</div>
                    </div>
                    <div className="flex-grow grid grid-cols-3 md:grid-cols-4 gap-3 overflow-y-auto no-scrollbar pb-4">
                      {shuffledLabAnimals.map(animal => {
                        const isMatched = labMatchedIds.has(animal.id);
                        const texture = TEXTURES.find(t => t.id === animal.texture);
                        return (
                          <button key={animal.id} onClick={() => handleLabGuess(animal)} className={`relative flex flex-col items-center justify-center rounded-[2rem] transition-all border-4 aspect-square ${isMatched ? `${texture.color} ${texture.borderColor} opacity-40 scale-90` : 'bg-white border-transparent shadow-md hover:shadow-lg'}`}>
                            <span className="text-5xl mb-2">{animal.emoji}</span>
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">{animal.name}</span>
                            {isMatched && <CheckCircle2 className="absolute top-4 right-4 text-emerald-500" size={24} />}
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {labMatchedIds.size === 12 && (
                    <div className="fixed inset-0 z-50 bg-sky-900/80 backdrop-blur-sm flex items-center justify-center animate-in fade-in">
                      <div className="bg-white rounded-[4rem] p-12 text-center max-w-sm w-full shadow-2xl border-8 border-sky-100">
                        <div className="text-8xl mb-6 animate-bounce">🏆</div>
                        <h2 className="text-4xl font-black text-sky-800 mb-2 uppercase">Lab Complete!</h2>
                        <button onClick={() => window.location.href='index.html'} className="mt-8 w-full py-4 bg-sky-600 text-white rounded-3xl text-xl font-black shadow-lg">Back to Menu</button>
                      </div>
                    </div>
                  )}
                </div>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
