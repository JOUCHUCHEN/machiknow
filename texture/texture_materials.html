<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials - MaachiiKnow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .font-sans { font-family: 'Roboto', sans-serif; }
        .font-logo { font-family: 'Noto Sans TC', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden font-sans">
    <div id="root" class="h-full"></div>
    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { ArrowLeft, Menu, X, MonitorPlay, ChevronLeft, ChevronRight, Download, FileText, FileImage } from 'lucide-react';

        const slideUrls = [
          "https://i.ibb.co/bjYZjv5X/1.png", "https://i.ibb.co/709rzzP/2.png", "https://i.ibb.co/kk6JHQs/3.png", 
          "https://i.ibb.co/CsHpG0yT/4.png", "https://i.ibb.co/7x2xZchn/5.png", "https://i.ibb.co/QvFRQmrD/6.png", 
          "https://i.ibb.co/7JjSNRhj/7.png", "https://i.ibb.co/dd7mW1L/8.png", "https://i.ibb.co/ZR2X8G9s/9.png", 
          "https://i.ibb.co/93T3Q2VX/10.png", "https://i.ibb.co/V0Jcj6bH/11.png", "https://i.ibb.co/60KnLN5q/12.png", 
          "https://i.ibb.co/7dds53mq/13.png", "https://i.ibb.co/XkMBRkNx/14.png", "https://i.ibb.co/FbWxMw0k/15.png"
        ];

        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [slideIndex, setSlideIndex] = useState(0);

          const handleDownload = (type) => {
            const urls = {
              pdf: "https://raw.githubusercontent.com/JOUCHUCHEN/CurioCat/main/animals/Animal_Field_Guide.pdf",
              ppt: "https://github.com/JOUCHUCHEN/CurioCat/blob/main/animals/Animal_Field_Guide.pptx?raw=true",
              flashcards: "https://raw.githubusercontent.com/JOUCHUCHEN/maachiiknow/main/animals/Flashcards.zip"
            };
            const link = document.createElement('a');
            link.href = urls[type];
            link.target = '_blank';
            link.click();
          };

          return (
            <div className="flex flex-col h-full">
              <nav className="bg-white shadow-sm h-20 border-b shrink-0 z-50 sticky top-0">
                <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                  <div className="flex items-center cursor-pointer group" onClick={() => window.location.href='index.html'}>
                    <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="Logo" className="w-16 h-16 group-hover:rotate-6 transition-all" />
                    <span className="font-logo font-black text-3xl text-gray-900 tracking-tighter">Maachii<span className="text-orange-600">Know</span></span>
                  </div>
                  <button onClick={() => window.location.href='index.html'} className="hidden md:block font-bold text-gray-500 hover:text-orange-600 tracking-widest uppercase transition-colors">Home</button>
                  <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-gray-600 p-2">{isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}</button>
                </div>
              </nav>

              <main className="flex-1 overflow-y-auto relative custom-scroll p-4 md:p-6">
                <div className="max-w-7xl mx-auto h-full flex flex-col animate-in fade-in">
                  <button onClick={() => window.location.href='index.html'} className="p-3 bg-white text-orange-600 rounded-2xl shadow-sm border mb-6 w-12"><ArrowLeft size={24}/></button>
                  
                  <div className="flex flex-col lg:flex-row gap-8">
                    <div className="w-full lg:w-2/3 bg-white rounded-[3rem] border p-8 shadow-sm">
                      <div className="flex justify-between items-center mb-6">
                        <h3 className="text-lg font-black flex items-center gap-3 text-gray-800 uppercase"><MonitorPlay size={24} className="text-orange-500" /> Preview</h3>
                        <span className="text-xs bg-orange-50 text-orange-600 px-4 py-1 rounded-full font-bold">Slide {slideIndex + 1} / 15</span>
                      </div>
                      <div className="aspect-video bg-gray-900 rounded-[2rem] overflow-hidden relative group flex items-center justify-center border-8 border-gray-800 shadow-inner">
                        <img src={slideUrls[slideIndex]} className="h-full object-contain" alt="Preview Slide" />
                        <button onClick={() => setSlideIndex(i => (i - 1 + 15) % 15)} className="absolute left-4 bg-white/80 p-3 rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity"><ChevronLeft /></button>
                        <button onClick={() => setSlideIndex(i => (i + 1) % 15)} className="absolute right-4 bg-white/80 p-3 rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity"><ChevronRight /></button>
                      </div>
                    </div>
                    
                    <div className="w-full lg:w-1/3 bg-white rounded-[3rem] border p-8 flex flex-col items-center justify-center gap-6 shadow-sm">
                      <div className="bg-orange-50 p-6 rounded-full text-orange-500 animate-pulse"><Download size={48} /></div>
                      <h3 className="text-2xl font-black text-gray-800 uppercase tracking-tighter">Materials</h3>
                      <div className="flex flex-col w-full gap-3">
                        <button onClick={() => handleDownload('ppt')} className="w-full bg-indigo-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 transition-transform active:scale-95"><MonitorPlay size={18} /> PPTX Presentation</button>
                        <button onClick={() => handleDownload('pdf')} className="w-full bg-rose-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 transition-transform active:scale-95"><FileText size={18} /> PDF Worksheet</button>
                        <button onClick={() => handleDownload('flashcards')} className="w-full bg-emerald-500 text-white py-4 rounded-2xl font-black flex items-center justify-center gap-2 transition-transform active:scale-95"><FileImage size={18} /> Flashcards Images</button>
                      </div>
                    </div>
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
