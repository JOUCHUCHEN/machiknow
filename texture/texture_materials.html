<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Materials - MaachiiKnow</title>
    
    <!-- 引入 Noto Sans TC (Logo使用) 與 Roboto (全站使用) 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        logo: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- UI 所需的自訂 CSS -->
    <style>
        body { font-family: 'Roboto', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        @keyframes bounce-slow { 
          0%, 100% { transform: translateY(-5%); } 
          50% { transform: translateY(0); } 
        }
        .animate-bounce-slow { animation: bounce-slow 3s infinite; }
    </style>

    <!-- Import Maps -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden">
    <!-- React 應用的掛載點 -->
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { ArrowLeft, Menu, X, MonitorPlay, ChevronLeft, ChevronRight, Download, FileText } from 'lucide-react';

        const slideUrls = [
          "https://i.ibb.co/Lh2g0Lzr/1.png", "https://i.ibb.co/Pz3Mxr0h/2.png", "https://i.ibb.co/rTgB29B/3.png", 
          "https://i.ibb.co/JFjXkvY0/4.png", "https://i.ibb.co/YFQj5VyL/5.png", "https://i.ibb.co/jvSdDjqh/6.png", 
          "https://i.ibb.co/R4C41YYB/7.png", "https://i.ibb.co/N6zWb7Kg/8.png", "https://i.ibb.co/Xfhv6vmR/9.png", 
          "https://i.ibb.co/fzxvYRsb/10.png", "https://i.ibb.co/hRJ01Rr9/11.png", "https://i.ibb.co/BKTxp1gX/12.png", 
          "https://i.ibb.co/5WNRFNRP/13.png"
        ];

        function App() {
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [slideIndex, setSlideIndex] = useState(0);

          // 導航至首頁 (加上 "/" 以導向網站根目錄)
          const navigateToHome = () => {
            window.location.href = '/index.html';
          };

          // 導航至質地介紹頁 (加上 "/" 以導向網站根目錄)
          const navigateToEnglishTexture = () => {
            window.location.href = '/english_texture.html';
          };

          const handleDownload = (type) => {
            const urls = {
              pdf: "https://github.com/JOUCHUCHEN/maachiiknow/blob/main/texture/Animal_Texture_Lab(13p).pdf?raw=true",
              ppt: "https://github.com/JOUCHUCHEN/maachiiknow/blob/main/texture/Animal_Texture_Lab(13p)(20MB).pptx?raw=true"
            };
            const link = document.createElement('a');
            link.href = urls[type];
            link.target = '_blank';
            link.click();
          };

          // --- Navbar Component ---
          const Navbar = () => (
            <nav className="bg-white shadow-sm h-16 border-b flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                {/* Logo 點擊回到網站根目錄 */}
                <div className="flex items-center cursor-pointer group" onClick={navigateToHome}>
                  <img 
                      src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                      alt="Maachiiknow Logo" 
                      className="w-12 h-12 object-contain group-hover:scale-110 group-hover:rotate-6 transition-all relative -top-0.5 left-0 z-0"
                   />
                   <span className="font-logo font-black text-2xl text-gray-900 tracking-tighter relative z-10 ml-0">
                     Maachii<span className="text-orange-600">Know</span>
                   </span>
                </div>
                
                <div className="hidden md:flex items-center space-x-12">
                  {/* Home 按鈕點擊回到網站根目錄 */}
                  <button 
                    onClick={navigateToHome} 
                    className="font-bold text-sm text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors"
                  >
                    Home
                  </button>
                </div>

                <button 
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                  className="md:hidden text-gray-600 p-2"
                >
                  {isMobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                </button>
              </div>
              
              {isMobileMenuOpen && (
                <div className="absolute top-16 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40 animate-in slide-in-from-top-2 duration-300">
                  <button 
                    onClick={navigateToHome} 
                    className="text-left font-bold text-gray-700"
                  >
                    Home
                  </button>
                </div>
              )}
            </nav>
          );

          return (
            <div className="min-h-screen bg-sky-50 flex flex-col h-screen overflow-hidden">
                <Navbar />

                <main className="flex-1 overflow-y-auto overflow-x-hidden relative custom-scroll p-4 lg:p-6">
                  <div className="max-w-7xl mx-auto h-full flex flex-col animate-in fade-in">
                    
                    {/* Header & Content Back Button - 回到網站根目錄下的 english_texture.html */}
                    <div className="flex items-center justify-between mb-4 bg-white p-2 sm:p-3 rounded-2xl shadow-sm border border-sky-100 shrink-0">
                      <button 
                        onClick={navigateToEnglishTexture} 
                        className="p-2 sm:p-3 text-orange-600 hover:bg-orange-50 rounded-xl transition-all shadow-sm active:scale-90"
                      >
                        <ArrowLeft size={24} />
                      </button>
                      <h2 className="text-xl sm:text-2xl font-black text-slate-800 flex items-center gap-2">
                        <MonitorPlay className="text-emerald-500" size={24}/> Materials
                      </h2>
                      <div className="w-10 sm:w-12"></div>
                    </div>
                    
                    {/* 主要內容區 (使用 min-h-0 讓子層能自適應縮放高度) */}
                    <div className="flex flex-col lg:flex-row gap-4 lg:gap-6 flex-1 min-h-0">
                      
                      {/* 左側：簡報預覽 */}
                      <div className="w-full lg:w-2/3 bg-white rounded-[2rem] border p-4 sm:p-6 shadow-sm flex flex-col">
                        <div className="flex justify-between items-center mb-3 sm:mb-4">
                          <h3 className="text-base font-black flex items-center gap-2 text-gray-800 uppercase">
                            <MonitorPlay size={20} className="text-orange-500" /> Preview
                          </h3>
                          <span className="text-xs bg-orange-50 text-orange-600 px-3 py-1 rounded-full font-bold">
                            Slide {slideIndex + 1} / 13
                          </span>
                        </div>
                        {/* 預覽區塊：利用 flex-1 填滿高度，並使用絕對定位控制圖片比例 */}
                        <div className="flex-1 bg-gray-900 rounded-[1.5rem] overflow-hidden relative group flex items-center justify-center border-[6px] border-gray-800 shadow-inner min-h-[250px]">
                          <img src={slideUrls[slideIndex]} className="absolute inset-0 w-full h-full object-contain" alt="Preview Slide" />
                          <button onClick={() => setSlideIndex(i => (i - 1 + 13) % 13)} className="absolute left-3 sm:left-4 bg-white/80 p-2 sm:p-3 rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity">
                            <ChevronLeft size={20} />
                          </button>
                          <button onClick={() => setSlideIndex(i => (i + 1) % 13)} className="absolute right-3 sm:right-4 bg-white/80 p-2 sm:p-3 rounded-full shadow-md opacity-0 group-hover:opacity-100 transition-opacity">
                            <ChevronRight size={20} />
                          </button>
                        </div>
                      </div>
                      
                      {/* 右側：下載區與廣告位 */}
                      <div className="w-full lg:w-1/3 flex flex-col gap-4 lg:gap-6">
                        
                        {/* 下載區 */}
                        <div className="bg-white rounded-[2rem] border p-4 sm:p-6 flex flex-col items-center justify-center gap-3 sm:gap-4 shadow-sm shrink-0">
                          <div className="bg-orange-50 p-3 sm:p-4 rounded-full text-orange-500 animate-pulse">
                            <Download size={32} />
                          </div>
                          <h3 className="text-lg sm:text-xl font-black text-gray-800 uppercase tracking-tighter">Download</h3>
                          <div className="flex flex-col w-full gap-2 sm:gap-3">
                            <button onClick={() => handleDownload('ppt')} className="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl font-black flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-md">
                              <MonitorPlay size={18} /> PPTX Presentation
                            </button>
                            <button onClick={() => handleDownload('pdf')} className="w-full bg-rose-500 hover:bg-rose-600 text-white py-3 rounded-xl font-black flex items-center justify-center gap-2 transition-transform active:scale-95 shadow-md">
                              <FileText size={18} /> PDF Worksheet
                            </button>
                          </div>
                        </div>

                        {/* 廣告位 Advertisement Slot */}
                        <div className="bg-slate-100 rounded-[2rem] border-2 border-dashed border-slate-300 flex flex-col items-center justify-center flex-1 min-h-[150px] lg:min-h-[200px] text-slate-400 group hover:bg-slate-200 transition-colors cursor-pointer relative overflow-hidden">
                           <span className="font-bold uppercase tracking-widest text-xs sm:text-sm z-10">Advertisement</span>
                           <span className="text-[10px] sm:text-xs mt-1 sm:mt-2 opacity-60 z-10">Space reserved for Ad</span>
                           {/* 裝飾性背景 */}
                           <div className="absolute inset-0 opacity-[0.02] group-hover:opacity-5 transition-opacity bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 to-transparent"></div>
                        </div>

                      </div>
                    </div>

                  </div>
                </main>

                <footer className="bg-white/80 backdrop-blur-sm border-t py-3 sm:py-4 text-center shrink-0 z-50 relative">
                  <p className="text-[10px] text-gray-400 font-black uppercase tracking-[0.3em]">
                    © 2026 MaachiiKnow. All rights reserved.
                  </p>
                </footer>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
