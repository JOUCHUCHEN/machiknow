<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Library - MaachiiKnow</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        logo: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02)',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Roboto', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        @keyframes bounce-slow { 
          0%, 100% { transform: translateY(-5%); } 
          50% { transform: translateY(0); } 
        }
        .animate-bounce-slow { animation: bounce-slow 3s infinite; }
        
        .zoom-overlay { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden">
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, ArrowLeft, Menu, X, Volume2, Sparkles, ChevronRight, Maximize2 } from 'lucide-react';

        // 質地定義
        const TEXTURES = [
          { 
            id: 'scales', 
            name: 'Scales', 
            adjectives: 'Hard and shiny', 
            gradient: 'from-emerald-50 to-emerald-100/50', 
            borderColor: 'border-emerald-400', 
            textColor: 'text-emerald-800', 
            ringColor: 'ring-emerald-200',
            image: 'https://i.ibb.co/Kx5QgzjW/scales.jpg' 
          },
          { 
            id: 'feathers', 
            name: 'Feathers', 
            adjectives: 'Soft and light', 
            gradient: 'from-rose-50 to-rose-100/50', 
            borderColor: 'border-rose-400', 
            textColor: 'text-rose-800', 
            ringColor: 'ring-rose-200',
            image: 'https://i.ibb.co/VpD6SBfy/feathers.jpg' 
          },
          { 
            id: 'fur', 
            name: 'Fur', 
            adjectives: 'Warm and thick', 
            gradient: 'from-amber-50 to-amber-100/50', 
            borderColor: 'border-amber-400', 
            textColor: 'text-amber-800', 
            ringColor: 'ring-amber-200',
            image: 'https://i.ibb.co/wZz1kC2Y/fur.jpg' 
          },
          { 
            id: 'skin', 
            name: 'Skin', 
            adjectives: 'Bare skin', 
            gradient: 'from-cyan-50 to-cyan-100/50', 
            borderColor: 'border-cyan-400', 
            textColor: 'text-cyan-800', 
            ringColor: 'ring-cyan-200',
            image: 'https://i.ibb.co/JWn0W1Gb/skin.png' 
          }
        ];

        // 動物數據與描述
        const ANIMALS = [
          { id: 'snake', name: 'Snake', texture: 'scales', emoji: '🐍', desc: 'Snakes have dry and hard scales.' }, 
          { id: 'fish', name: 'Fish', texture: 'scales', emoji: '🐟', desc: 'Fish have shiny and wet scales.' }, 
          { id: 'crocodile', name: 'Crocodile', texture: 'scales', emoji: '🐊', image: 'https://i.ibb.co/Ng3L4Xw2/miniformat65-nile-crocodile-245013-1920.jpg', desc: 'Crocodiles have very hard scales.' },
          { id: 'lizard', name: 'Lizard', texture: 'scales', emoji: '🦎', image: 'https://i.ibb.co/SwT4hFnB/pavanprasad-ind-lizard-9076520-1920.jpg', zoomClass: 'scale-[2.5] object-[center_40%]', desc: 'Lizards have small and dry scales.' },
          { id: 'eagle', name: 'Eagle', texture: 'feathers', emoji: '🦅', image: 'https://i.ibb.co/5gVzdnGc/stacyvitallo-eagle-1029909-1920.jpg', desc: 'Eagles have strong feathers for flying.' }, 
          { id: 'crow', name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛', image: 'https://i.ibb.co/kgBKWdwG/chiemseherin-raven-bird-3696515-1920.jpg', desc: 'Crows have black and shiny feathers.' }, 
          { id: 'parrot', name: 'Parrot', texture: 'feathers', emoji: '🦜', image: 'https://i.ibb.co/v4SmBfMV/beckytregear-bird-4728857-1920.jpg', desc: 'Parrots have colorful feathers.' },
          { id: 'owl', name: 'Owl', texture: 'feathers', emoji: '🦉', image: 'https://i.ibb.co/gZWtxzYh/iulian-ursache-great-horned-owl-5463688-1920.jpg', desc: 'Owls have very soft feathers.' },
          { id: 'dog', name: 'Dog', texture: 'fur', emoji: '🐶', image: 'https://i.ibb.co/Mykm32YH/enirehtacess-border-collie-4449956-1920.jpg', desc: 'Dogs are our furry best friends.' }, 
          { id: 'lion', name: 'Lion', texture: 'fur', emoji: '🦁', image: 'https://i.ibb.co/SXHL39W5/ambquinn-lion-7573939-1280.jpg', desc: 'Lions have thick and warm fur.' }, 
          { id: 'horse', name: 'Horse', texture: 'fur', emoji: '🐴', image: 'https://i.ibb.co/r28tcFMz/richardpics-horse-4530644-1280.jpg', desc: 'Horses have short and smooth fur.' },
          { id: 'panda', name: 'Panda', texture: 'fur', emoji: '🐼', image: 'https://i.ibb.co/JRzTXdx2/995645-panda-3875426-1280.jpg', desc: 'Pandas have thick black and white fur.' },
          { id: 'whale', name: 'Whale', texture: 'skin', emoji: '🐳', image: 'https://i.ibb.co/35bv6dgB/fitschen-whale-1302757-1280.jpg', desc: 'Whales have smooth skin.' }, 
          { id: 'dolphin', name: 'Dolphin', texture: 'skin', emoji: '🐬', image: 'https://i.ibb.co/h1ZsPBxk/werdepate-dolphin-2709809-1280.jpg', desc: 'Dolphins have very smooth skin for swimming fast.' }, 
          { id: 'frog', name: 'Frog', texture: 'skin', emoji: '🐸', image: 'https://i.ibb.co/vvqWjKtZ/garten-gg-animals-4322025-1280.jpg', desc: 'Frogs have smooth and wet skin.' },
          { id: 'elephant', name: 'Elephant', texture: 'skin', emoji: '🐘', image: 'https://i.ibb.co/JwRvB1YZ/jbauer-fotographie-elephant-3832516-1920.jpg', desc: 'Elephants have rough and thick skin. Elephant skin is not smooth!' }
        ];

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        function App() {
          const [selectedTexture, setSelectedTexture] = useState(null);
          const [activeAnimal, setActiveAnimal] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
          const [zoomedImage, setZoomedImage] = useState(null);

          const navigateToHome = () => { window.location.href = '/index.html'; };
          const navigateToEnglishTexture = () => { window.location.href = '/english_texture.html'; };

          // 輔助函式：將句子拆分為「引導語」與「關鍵描述」
          const formatDescription = (desc) => {
            const regex = /^([A-Za-z\s]+(?:have|are))\s(.*)$/i;
            const match = desc.match(regex);
            if (match) {
              return (
                <p className="text-2xl sm:text-4xl xl:text-5xl 2xl:text-6xl leading-tight tracking-tight">
                  <span className="text-slate-600 font-medium">{match[1]} </span>
                  <span className="text-orange-600 font-black">{match[2]}</span>
                </p>
              );
            }
            return <p className="text-2xl sm:text-4xl xl:text-5xl 2xl:text-6xl font-black text-orange-600 leading-tight tracking-tight">{desc}</p>;
          };

          const Navbar = () => (
            <nav className="bg-white shadow-sm h-16 xl:h-20 border-b flex-shrink-0 z-50 sticky top-0 w-full">
              <div className="max-w-[1600px] mx-auto px-4 lg:px-6 2xl:px-8 h-full flex justify-between items-center">
                <div className="flex items-center cursor-pointer group" onClick={navigateToHome}>
                  <img 
                      src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                      alt="Maachiiknow Logo" 
                      className="w-12 h-12 xl:w-16 xl:h-16 object-contain group-hover:scale-110 group-hover:rotate-6 transition-all relative -top-1 left-0 z-0"
                   />
                   <span className="font-logo font-black text-2xl xl:text-3xl text-gray-900 tracking-tighter relative z-10 ml-0">
                     Maachii<span className="text-orange-600">Know</span>
                   </span>
                </div>
                
                <div className="hidden md:flex items-center space-x-12">
                  <button 
                    onClick={navigateToHome} 
                    className="font-bold text-sm xl:text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors"
                  >
                    Home
                  </button>
                </div>

                <button 
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                  className="md:hidden text-gray-600 p-2"
                >
                  {isMobileMenuOpen ? <X className="w-6 h-6" /> : <Menu className="w-6 h-6" />}
                </button>
              </div>
            </nav>
          );

          return (
            <div className="min-h-screen bg-sky-50 flex flex-col h-screen overflow-hidden w-full">
                <Navbar />

                <main className="flex-1 overflow-y-auto overflow-x-hidden relative custom-scroll p-4 md:p-6 xl:p-8 flex flex-col items-center w-full">
                  
                  {/* 共用頂部標題區：依據是否在詳情頁來伸縮最大寬度 */}
                  <div className={`flex items-center justify-between mb-6 xl:mb-8 bg-white p-3 xl:p-4 rounded-full shadow-sm border border-sky-100 flex-shrink-0 w-full transition-all duration-500 ${selectedTexture ? 'max-w-[1400px]' : 'max-w-5xl'}`}>
                    <button 
                      onClick={() => selectedTexture ? setSelectedTexture(null) : navigateToEnglishTexture()} 
                      className="p-2 xl:p-3 text-orange-600 hover:bg-orange-50 rounded-full transition-all shadow-sm active:scale-90"
                    >
                      <ArrowLeft className="w-6 h-6 xl:w-8 xl:h-8" />
                    </button>
                    <h2 className="text-2xl sm:text-3xl xl:text-4xl 2xl:text-5xl font-black text-slate-800 flex items-center gap-3 xl:gap-4">
                      <BookOpen className="text-emerald-500 w-7 h-7 xl:w-9 xl:h-9" /> Texture Library
                    </h2>
                    <div className="w-10 xl:w-14"></div>
                  </div>

                  {/* 核心內容區：動態切換佈局限制 */}
                  <div className={`flex-1 min-h-0 w-full transition-all duration-500 flex flex-col ${selectedTexture ? 'max-w-[1400px]' : 'max-w-5xl justify-center'}`}>
                    {!selectedTexture ? (
                      /* 首頁 2x2 網格：完美的膠囊狀 */
                      <div className="grid grid-cols-1 md:grid-cols-2 grid-rows-2 gap-4 sm:gap-6 xl:gap-8 h-auto w-full animate-in fade-in slide-in-from-bottom-4">
                        {TEXTURES.map((t) => (
                          <button 
                            key={t.id} 
                            onClick={() => { setSelectedTexture(t); }}
                            className="relative bg-white border border-slate-100 rounded-full shadow-premium hover:shadow-2xl hover:-translate-y-1 transform transition-all duration-500 group overflow-hidden flex flex-row items-center justify-start gap-4 sm:gap-6 lg:gap-8 xl:gap-10 p-3 xl:p-4 pr-8 sm:pr-10 xl:pr-16"
                          >
                            <div className={`absolute inset-0 bg-gradient-to-r ${t.gradient} opacity-40 group-hover:opacity-60 transition-opacity`}></div>
                            <Sparkles className="absolute top-1/2 -translate-y-1/2 right-6 xl:right-10 text-white/40 group-hover:text-white/80 transition-colors w-6 h-6 xl:w-8 xl:h-8 2xl:w-10 2xl:h-10" />

                            <div className="relative flex-shrink-0">
                              <div className={`absolute inset-0 rounded-full ring-4 ${t.ringColor} scale-[1.05] opacity-50`}></div>
                              <img 
                                src={t.image} 
                                alt={t.name} 
                                className="w-20 h-20 sm:w-28 sm:h-28 xl:w-36 xl:h-36 2xl:w-40 2xl:h-40 object-cover rounded-full shadow-lg border-[4px] xl:border-[6px] border-white relative z-10 group-hover:scale-105 transition-transform duration-500"
                              />
                            </div>

                            <div className="relative z-10 text-left flex-1">
                              <h3 className={`text-3xl sm:text-4xl lg:text-5xl xl:text-6xl 2xl:text-7xl font-black ${t.textColor} tracking-tight leading-none`}>{t.name}</h3>
                              <div className={`mt-1 xl:mt-2 flex items-center justify-start gap-1 text-[10px] sm:text-xs xl:text-sm 2xl:text-base font-bold ${t.textColor} opacity-60 uppercase tracking-widest`}>
                                Explore <ChevronRight className="w-3 h-3 xl:w-4 xl:h-4" />
                              </div>
                            </div>
                          </button>
                        ))}
                      </div>
                    ) : (
                      /* 詳情頁：左右兩欄佈局，解除原本的寬度擠壓限制 */
                      <div className="bg-white rounded-[3rem] xl:rounded-[4rem] border border-slate-100 shadow-2xl relative h-full flex flex-col lg:flex-row overflow-hidden animate-in zoom-in-95 fade-in duration-500 w-full">
                        <div className={`absolute inset-0 bg-gradient-to-b lg:bg-gradient-to-r ${selectedTexture.gradient} opacity-20 pointer-events-none`}></div>
                        
                        {/* 左側：質地大圖與主題標題 */}
                        <div className="relative z-10 lg:w-5/12 flex flex-col items-center justify-center p-6 sm:p-10 xl:p-12 lg:pr-12 xl:pr-16 lg:border-r border-slate-100/50 shrink-0">
                          <div 
                            className="relative cursor-pointer group/img mb-6 sm:mb-8 xl:mb-12"
                            onClick={() => setZoomedImage(selectedTexture.image)}
                          >
                            <img 
                              src={selectedTexture.image} 
                              alt={selectedTexture.name} 
                              className="w-32 h-32 sm:w-48 sm:h-48 lg:w-56 lg:h-56 xl:w-72 xl:h-72 2xl:w-[22rem] 2xl:h-[22rem] object-cover rounded-full shadow-2xl border-[8px] xl:border-[10px] border-white animate-bounce-slow group-hover/img:scale-105 transition-transform"
                            />
                            <div className="absolute -bottom-2 -right-2 xl:-bottom-3 xl:-right-3 bg-white p-2 xl:p-3 rounded-full shadow-md text-orange-600 opacity-0 group-hover/img:opacity-100 transition-opacity">
                              <Maximize2 className="w-6 h-6 xl:w-8 xl:h-8" />
                            </div>
                          </div>

                          <div className="text-center flex flex-col items-center">
                            <div className="flex items-center justify-center gap-3 sm:gap-4 xl:gap-5 mb-4 xl:mb-6">
                              <h3 className={`text-4xl sm:text-6xl xl:text-7xl font-black ${selectedTexture.textColor} tracking-tight`}>{selectedTexture.name}</h3>
                              <button 
                                onClick={() => speak(selectedTexture.name)}
                                className={`w-10 h-10 sm:w-12 sm:h-12 xl:w-14 xl:h-14 rounded-full bg-white/60 hover:bg-white hover:shadow-md flex items-center justify-center transition-all opacity-80 hover:opacity-100 active:scale-95 ${selectedTexture.textColor}`}
                              >
                                <Volume2 className="w-6 h-6 xl:w-7 xl:h-7" />
                              </button>
                            </div>
                            
                            <div className="flex items-center justify-center gap-3 xl:gap-4">
                              <div className={`inline-flex items-center gap-2 px-6 py-3 xl:px-7 xl:py-4 rounded-full text-base sm:text-xl xl:text-2xl font-black bg-white/80 backdrop-blur shadow-sm border border-white ${selectedTexture.textColor}`}>
                                <span className="w-3 h-3 xl:w-4 xl:h-4 rounded-full bg-current animate-pulse"></span>
                                {selectedTexture.adjectives}
                              </div>
                              <button 
                                onClick={() => speak(selectedTexture.adjectives)}
                                className={`w-10 h-10 sm:w-12 sm:h-12 xl:w-14 xl:h-14 rounded-full bg-white/60 hover:bg-white hover:shadow-md flex items-center justify-center transition-all opacity-80 hover:opacity-100 active:scale-95 ${selectedTexture.textColor}`}
                              >
                                <Volume2 className="w-6 h-6 xl:w-7 xl:h-7" />
                              </button>
                            </div>
                          </div>
                        </div>

                        {/* 右側：2x2 動物網格 (加入防溢出的內層容器) */}
                        <div className="relative z-10 flex-1 overflow-y-auto custom-scroll p-4 lg:p-6 xl:p-8">
                          <div className="min-h-full flex flex-col items-center justify-center">
                            <div className="grid grid-cols-2 gap-3 xl:gap-5 w-full max-w-[20rem] xl:max-w-[28rem] 2xl:max-w-[32rem] mx-auto py-4">
                              {ANIMALS.filter(a => a.texture === selectedTexture.id).map(animal => (
                                <div 
                                  key={animal.id} 
                                  className="bg-white/60 backdrop-blur-sm p-4 xl:p-6 2xl:p-8 rounded-[1.5rem] xl:rounded-[2rem] border border-white hover:border-orange-200 hover:bg-white hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer flex flex-col items-center justify-center group relative overflow-hidden" 
                                  onClick={() => {
                                      setActiveAnimal(animal);
                                  }}
                                >
                                  <div className="absolute -right-4 -bottom-4 w-12 h-12 xl:w-16 xl:h-16 bg-orange-50 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                  
                                  <div className="mb-3 xl:mb-4 transform group-hover:scale-110 group-hover:rotate-6 transition-transform relative z-10 flex justify-center">
                                    {animal.image ? (
                                      <div className="w-20 h-20 sm:w-24 sm:h-24 xl:w-32 xl:h-32 2xl:w-40 2xl:h-40 rounded-full shadow-md border-[4px] xl:border-[6px] border-white overflow-hidden">
                                        <img src={animal.image} alt={animal.name} className={`w-full h-full object-cover transition-transform ${animal.zoomClass || ''}`} />
                                      </div>
                                    ) : (
                                      <span className="text-5xl sm:text-6xl xl:text-7xl 2xl:text-8xl">{animal.emoji}</span>
                                    )}
                                  </div>

                                  <div className="text-lg sm:text-xl xl:text-3xl font-black text-slate-700 tracking-tighter relative z-10 leading-none pb-1 xl:pb-2">{animal.name}</div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </main>

                {/* 圖片放大 Overlay */}
                {zoomedImage && (
                    <div 
                        className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 zoom-overlay"
                        onClick={() => setZoomedImage(null)}
                    >
                        <div className="relative max-w-4xl xl:max-w-5xl w-full flex flex-col items-center">
                            <button className="absolute -top-12 right-0 xl:-top-16 text-white hover:text-orange-400 transition-colors">
                                <X className="w-10 h-10 xl:w-12 xl:h-12" />
                            </button>
                            <img 
                                src={zoomedImage} 
                                className="max-h-[80vh] w-auto rounded-3xl xl:rounded-[3rem] shadow-2xl border-4 xl:border-[8px] border-white/20"
                                alt="Zoomed Texture"
                            />
                            <p className="mt-6 xl:mt-8 text-white text-2xl xl:text-3xl font-black tracking-widest uppercase">
                                {selectedTexture?.name} Detail
                            </p>
                        </div>
                    </div>
                )}

                {/* 動物描述 Popup */}
                {activeAnimal && (
                    <div 
                        className="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 xl:p-8 zoom-overlay"
                        onClick={() => setActiveAnimal(null)}
                    >
                        <div 
                            className="bg-white w-full max-w-2xl xl:max-w-4xl rounded-[3rem] xl:rounded-[4rem] p-8 sm:p-12 xl:p-20 shadow-2xl border border-white relative animate-in zoom-in-95 duration-300 max-h-[95vh] overflow-y-auto no-scrollbar"
                            onClick={(e) => e.stopPropagation()}
                        >
                            <button 
                                onClick={() => setActiveAnimal(null)}
                                className="absolute top-6 right-6 sm:top-8 sm:right-8 xl:top-12 xl:right-12 p-2 text-slate-300 hover:text-orange-500 transition-colors"
                            >
                                <X className="w-9 h-9 xl:w-12 xl:h-12" />
                            </button>

                            <div className="flex flex-col items-center text-center">
                                <div className="mb-6 sm:mb-8 xl:mb-12 animate-bounce-slow flex justify-center">
                                    {activeAnimal.image ? (
                                        <div className="w-48 h-48 sm:w-64 sm:h-64 xl:w-80 xl:h-80 2xl:w-96 2xl:h-96 rounded-full shadow-2xl border-[6px] xl:border-[10px] border-white overflow-hidden">
                                            <img src={activeAnimal.image} alt={activeAnimal.name} className={`w-full h-full object-cover ${activeAnimal.zoomClass || ''}`} />
                                        </div>
                                    ) : (
                                        <span className="text-[10rem] lg:text-[12rem] xl:text-[15rem]">{activeAnimal.emoji}</span>
                                    )}
                                </div>

                                <div className="flex items-center justify-center gap-4 xl:gap-6 mb-6 xl:mb-8">
                                    <h4 className="text-3xl sm:text-5xl xl:text-6xl font-black text-slate-800 tracking-tight">
                                        {activeAnimal.name}
                                    </h4>
                                    <button 
                                      onClick={() => speak(activeAnimal.name)}
                                      className="w-10 h-10 sm:w-12 sm:h-12 xl:w-14 xl:h-14 rounded-full bg-slate-100 hover:bg-slate-200 flex items-center justify-center transition-all text-slate-500 hover:text-orange-600 active:scale-95"
                                    >
                                      <Volume2 className="w-6 h-6 xl:w-7 xl:h-7" />
                                    </button>
                                </div>
                                
                                <div className="bg-orange-50/50 p-6 sm:p-10 xl:p-12 rounded-[2.5rem] xl:rounded-[3rem] border-2 border-orange-100/50 relative mb-8 xl:mb-10 w-full">
                                    <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-white px-6 xl:px-8 text-orange-400 text-sm xl:text-lg font-black uppercase tracking-widest flex items-center gap-2">
                                        Learning Sentence
                                    </div>
                                    {formatDescription(activeAnimal.desc)}
                                </div>

                                <button 
                                    onClick={() => speak(activeAnimal.desc)}
                                    className="flex items-center gap-3 xl:gap-5 bg-orange-500 hover:bg-orange-600 text-white px-10 py-5 xl:px-14 xl:py-7 rounded-2xl xl:rounded-3xl font-black text-xl xl:text-3xl shadow-lg shadow-orange-200 active:scale-95 transition-all"
                                >
                                    <Volume2 className="w-7 h-7 xl:w-9 xl:h-9" /> Listen Again
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                <footer className="bg-white/80 backdrop-blur-sm border-t py-4 xl:py-5 text-center shrink-0 w-full">
                  <p className="text-[10px] xl:text-xs text-gray-400 font-black uppercase tracking-[0.3em]">
                    © 2026 MaachiiKnow. All rights reserved.
                  </p>
                </footer>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
