<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Book - MaachiiKnow</title>
    
    <!-- 引入 Noto Sans TC (Logo使用) 與 Roboto (全站使用) 字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        logo: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02)',
                    }
                }
            }
        }
    </script>

    <!-- UI 所需的自訂 CSS -->
    <style>
        body { font-family: 'Roboto', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #7dd3fc; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        @keyframes bounce-slow { 
          0%, 100% { transform: translateY(-5%); } 
          50% { transform: translateY(0); } 
        }
        .animate-bounce-slow { animation: bounce-slow 3s infinite; }
    </style>

    <!-- Import Maps -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 h-screen overflow-hidden">
    <!-- React 應用的掛載點 -->
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, ArrowLeft, Menu, X, Volume2, Sparkles, ChevronRight } from 'lucide-react';

        // 質地定義：包含圖片、名稱、形容詞與顏色主題
        const TEXTURES = [
          { 
            id: 'scales', 
            name: 'Scales', 
            adjectives: 'Hard and shiny', 
            gradient: 'from-emerald-50 to-emerald-100/50', 
            borderColor: 'border-emerald-400', 
            textColor: 'text-emerald-800', 
            ringColor: 'ring-emerald-200',
            image: 'https://i.ibb.co/Kx5QgzjW/scales.jpg' 
          },
          { 
            id: 'feathers', 
            name: 'Feathers', 
            adjectives: 'Soft and light', 
            gradient: 'from-rose-50 to-rose-100/50', 
            borderColor: 'border-rose-400', 
            textColor: 'text-rose-800', 
            ringColor: 'ring-rose-200',
            image: 'https://i.ibb.co/VpD6SBfy/feathers.jpg' 
          },
          { 
            id: 'fur', 
            name: 'Fur', 
            adjectives: 'Warm and thick', 
            gradient: 'from-amber-50 to-amber-100/50', 
            borderColor: 'border-amber-400', 
            textColor: 'text-amber-800', 
            ringColor: 'ring-amber-200',
            image: 'https://i.ibb.co/wZz1kC2Y/fur.jpg' 
          },
          { 
            id: 'skin', 
            name: 'Skin', 
            adjectives: 'Bare skin', 
            gradient: 'from-cyan-50 to-cyan-100/50', 
            borderColor: 'border-cyan-400', 
            textColor: 'text-cyan-800', 
            ringColor: 'ring-cyan-200',
            image: 'https://i.ibb.co/JWn0W1Gb/skin.png' 
          }
        ];

        // 動物數據與描述
        const ANIMALS = [
          { id: 'snake', name: 'Snake', texture: 'scales', emoji: '🐍', desc: 'They have dry and hard scales.' }, 
          { id: 'fish', name: 'Fish', texture: 'scales', emoji: '🐟', desc: 'They have shiny and wet scales.' }, 
          { id: 'crocodile', name: 'Crocodile', texture: 'scales', emoji: '🐊', desc: 'Very hard scales.' },
          { id: 'lizard', name: 'Lizard', texture: 'scales', emoji: '🦎', desc: 'Small and dry scales.' },
          { id: 'eagle', name: 'Eagle', texture: 'feathers', emoji: '🦅', desc: 'Strong feathers for flying.' }, 
          { id: 'crow', name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛', desc: 'Black and shiny feathers.' }, 
          { id: 'parrot', name: 'Parrot', texture: 'feathers', emoji: '🦜', desc: 'Colorful feathers.' },
          { id: 'owl', name: 'Owl', texture: 'feathers', emoji: '🦉', desc: 'Very soft feathers.' },
          { id: 'dog', name: 'Dog', texture: 'fur', emoji: '🐶', desc: 'Our furry best friends.' }, 
          { id: 'lion', name: 'Lion', texture: 'fur', emoji: '🦁', desc: 'Thick and warm fur.' }, 
          { id: 'horse', name: 'Horse', texture: 'fur', emoji: '🐴', desc: 'Short and smooth fur.' },
          { id: 'panda', name: 'Panda', texture: 'fur', emoji: '🐼', desc: 'Thick black and white fur.' },
          { id: 'whale', name: 'Whale', texture: 'skin', emoji: '🐳', desc: 'Smooth skin.' }, 
          { id: 'dolphin', name: 'Dolphin', texture: 'skin', emoji: '🐬', desc: 'Very smooth skin for swimming fast.' }, 
          { id: 'frog', name: 'Frog', texture: 'skin', emoji: '🐸', desc: 'Smooth and wet skin.' },
          { id: 'elephant', name: 'Elephant', texture: 'skin', emoji: '🐘', desc: 'Rough and thick skin. Elephant skin is not smooth!' }
        ];

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        function App() {
          const [selectedTexture, setSelectedTexture] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          // 導航至首頁 (加上 "/" 以導向網站根目錄)
          const navigateToHome = () => {
            window.location.href = '/index.html';
          };

          // 導航至質地介紹頁 (加上 "/" 以導向網站根目錄)
          const navigateToEnglishTexture = () => {
            window.location.href = '/english_texture.html';
          };

          // --- Navbar Component ---
          const Navbar = () => (
            <nav className="bg-white shadow-sm h-20 border-b flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-4 h-full flex justify-between items-center">
                {/* Logo 點擊回到網站根目錄 */}
                <div className="flex items-center cursor-pointer group" onClick={navigateToHome}>
                  <img 
                      src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" 
                      alt="Maachiiknow Logo" 
                      className="w-16 h-16 object-contain group-hover:scale-110 group-hover:rotate-6 transition-all relative -top-1 left-0 z-0"
                   />
                   <span className="font-logo font-black text-3xl text-gray-900 tracking-tighter relative z-10 ml-0">
                     Maachii<span className="text-orange-600">Know</span>
                   </span>
                </div>
                
                <div className="hidden md:flex items-center space-x-12">
                  {/* Home 按鈕點擊回到網站根目錄 */}
                  <button 
                    onClick={navigateToHome} 
                    className="font-bold text-base text-gray-500 hover:text-orange-600 uppercase tracking-widest transition-colors"
                  >
                    Home
                  </button>
                </div>

                <button 
                  onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} 
                  className="md:hidden text-gray-600 p-2"
                >
                  {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                </button>
              </div>
              
              {isMobileMenuOpen && (
                <div className="absolute top-20 left-0 w-full bg-white shadow-xl border-b md:hidden flex flex-col p-6 space-y-4 z-40 animate-in slide-in-from-top-2 duration-300">
                  <button 
                    onClick={navigateToHome} 
                    className="text-left font-bold text-gray-700"
                  >
                    Home
                  </button>
                </div>
              )}
            </nav>
          );

          return (
            <div className="min-h-screen bg-sky-50 flex flex-col h-screen overflow-hidden">
                <Navbar />

                <main className="flex-1 overflow-y-auto overflow-x-hidden relative custom-scroll p-4 md:p-6">
                  <div className="max-w-5xl mx-auto h-full flex flex-col">
                    
                    {/* Header & Content Back Button - 回到網站根目錄下的 english_texture.html */}
                    <div className="flex items-center justify-between mb-8 bg-white p-3 rounded-3xl shadow-sm border border-sky-100 flex-shrink-0">
                      <button 
                        onClick={() => selectedTexture ? setSelectedTexture(null) : navigateToEnglishTexture()} 
                        className="p-3 text-orange-600 hover:bg-orange-50 rounded-2xl transition-all shadow-sm active:scale-90"
                      >
                        <ArrowLeft size={28} />
                      </button>
                      <h2 className="text-2xl sm:text-3xl font-black text-slate-800 flex items-center gap-3">
                        <BookOpen className="text-emerald-500" /> Texture Book
                      </h2>
                      <div className="w-12"></div>
                    </div>

                    <div className="flex-1 min-h-0">
                      {!selectedTexture ? (
                        /* 首頁 2x2 網格：圖片在左，文字在右 */
                        <div className="grid grid-cols-1 md:grid-cols-2 grid-rows-2 gap-4 sm:gap-6 h-full animate-in fade-in slide-in-from-bottom-4">
                          {TEXTURES.map((t) => (
                            <button 
                              key={t.id} 
                              onClick={() => { setSelectedTexture(t); speak(t.name); }} 
                              className="relative bg-white border border-slate-100 rounded-[2.5rem] shadow-premium hover:shadow-2xl hover:-translate-y-1 transform transition-all duration-500 group overflow-hidden flex flex-row items-center justify-start gap-4 sm:gap-8 px-6 sm:px-10"
                            >
                              <div className={`absolute inset-0 bg-gradient-to-br ${t.gradient} opacity-40 group-hover:opacity-60 transition-opacity`}></div>
                              <Sparkles className="absolute top-4 right-4 text-white/40 group-hover:text-white/80 transition-colors" size={20} />

                              <div className="relative flex-shrink-0">
                                <div className={`absolute inset-0 rounded-full ring-4 ${t.ringColor} scale-110 opacity-50`}></div>
                                <img 
                                  src={t.image} 
                                  alt={t.name} 
                                  className="w-16 h-16 sm:w-28 sm:h-28 lg:w-32 lg:h-32 object-cover rounded-full shadow-lg border-[4px] border-white relative z-10 group-hover:scale-105 transition-transform duration-500"
                                />
                              </div>

                              <div className="relative z-10 text-left">
                                <h3 className={`text-2xl sm:text-4xl font-black ${t.textColor} tracking-tighter leading-tight`}>{t.name}</h3>
                                <div className={`mt-1 flex items-center justify-start gap-1 text-[10px] sm:text-xs font-bold ${t.textColor} opacity-60 uppercase tracking-widest`}>
                                  Explore <ChevronRight size={12} />
                                </div>
                              </div>
                            </button>
                          ))}
                        </div>
                      ) : (
                        /* 詳情頁：標題圖片在左，文字在右 */
                        <div className="bg-white rounded-[3rem] p-6 sm:p-10 border border-slate-100 shadow-2xl text-center relative h-full flex flex-col min-h-0 animate-in zoom-in-95 fade-in duration-500 overflow-hidden">
                          <div className={`absolute inset-0 bg-gradient-to-b ${selectedTexture.gradient} opacity-20 pointer-events-none`}></div>
                          
                          <div className="flex-shrink-0 relative z-10 flex flex-row items-center justify-center gap-6 sm:gap-10 mb-6 sm:mb-8">
                            <img 
                              src={selectedTexture.image} 
                              alt={selectedTexture.name} 
                              className="w-24 h-24 sm:w-32 sm:h-32 object-cover rounded-full shadow-xl border-[6px] border-white animate-bounce-slow"
                            />
                            <div className="text-left">
                              <h3 className={`text-3xl sm:text-5xl font-black mb-2 ${selectedTexture.textColor} tracking-tight`}>{selectedTexture.name}</h3>
                              <div className={`inline-flex items-center gap-2 px-5 py-2 rounded-full text-sm sm:text-lg font-black bg-white/80 backdrop-blur shadow-sm border border-white ${selectedTexture.textColor}`}>
                                <span className="w-2 h-2 rounded-full bg-current animate-pulse"></span>
                                {selectedTexture.adjectives}
                              </div>
                            </div>
                          </div>

                          {/* 動物列表區域 */}
                          <div className="flex-1 overflow-y-auto pr-2 relative z-10 custom-scroll">
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4 pb-4">
                              {ANIMALS.filter(a => a.texture === selectedTexture.id).map(animal => (
                                <div 
                                  key={animal.id} 
                                  className="bg-white/60 backdrop-blur-sm p-5 rounded-[2rem] border border-white hover:border-orange-200 hover:bg-white hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer flex flex-col items-center group relative overflow-hidden" 
                                  onClick={() => speak(animal.desc)}
                                >
                                  <div className="absolute -right-4 -bottom-4 w-16 h-16 bg-orange-50 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                  
                                  <div className="text-5xl sm:text-6xl mb-3 transform group-hover:scale-110 group-hover:rotate-6 transition-transform relative z-10">
                                    {animal.emoji}
                                  </div>
                                  <div className="text-lg sm:text-xl font-black text-slate-700 tracking-tighter relative z-10">{animal.name}</div>
                                  
                                  <div className="mt-3 w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center opacity-40 group-hover:opacity-100 group-hover:bg-orange-100 transition-all">
                                    <Volume2 size={16} className="text-slate-400 group-hover:text-orange-600" />
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </main>

                <footer className="bg-white/80 backdrop-blur-sm border-t py-4 text-center shrink-0">
                  <p className="text-[10px] text-gray-400 font-black uppercase tracking-[0.3em]">
                    © 2026 MaachiiKnow. All rights reserved.
                  </p>
                </footer>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
