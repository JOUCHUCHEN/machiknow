<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texture Library - MaachiiKnow</title>
    
    <!-- Link Noto Sans TC (for Logo) and Roboto (for Global use) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@900&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Roboto', 'sans-serif'],
                        logo: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'premium': '0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02)',
                        'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS for UI -->
    <style>
        body { font-family: 'Roboto', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f0f9ff; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 20px; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; } 
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>

    <!-- Import Maps -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
        }
    }
    </script>

    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f8fafc] h-screen overflow-hidden flex flex-col">
    <!-- Root element for React -->
    <div id="root" class="flex-1 flex flex-col min-h-0"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'react';
        import { createRoot } from 'react-dom/client';
        import { BookOpen, ArrowLeft, Menu, X, Volume2, ChevronRight, Sparkles } from 'lucide-react';

        const TEXTURES = [
          { 
            id: 'scales', 
            name: 'Scales', 
            adjectives: 'Hard and shiny', 
            gradient: 'from-emerald-50 to-emerald-100/50', 
            borderColor: 'border-emerald-400', 
            textColor: 'text-emerald-800', 
            ringColor: 'ring-emerald-200',
            image: 'https://i.ibb.co/Kx5QgzjW/scales.jpg' 
          },
          { 
            id: 'feathers', 
            name: 'Feathers', 
            adjectives: 'Soft and light', 
            gradient: 'from-rose-50 to-rose-100/50', 
            borderColor: 'border-rose-400', 
            textColor: 'text-rose-800', 
            ringColor: 'ring-rose-200',
            image: 'https://i.ibb.co/VpD6SBfy/feathers.jpg' 
          },
          { 
            id: 'fur', 
            name: 'Fur', 
            adjectives: 'Warm and thick', 
            gradient: 'from-amber-50 to-amber-100/50', 
            borderColor: 'border-amber-400', 
            textColor: 'text-amber-800', 
            ringColor: 'ring-amber-200',
            image: 'https://i.ibb.co/wZz1kC2Y/fur.jpg' 
          },
          { 
            id: 'skin', 
            name: 'Skin', 
            adjectives: 'Bare skin', 
            gradient: 'from-cyan-50 to-cyan-100/50', 
            borderColor: 'border-cyan-400', 
            textColor: 'text-cyan-800', 
            ringColor: 'ring-cyan-200',
            image: 'https://i.ibb.co/JWn0W1Gb/skin.png' 
          }
        ];

        const ANIMALS = [
          { id: 'snake', name: 'Snake', texture: 'scales', emoji: '🐍', desc: 'They have dry and hard scales.' }, 
          { id: 'fish', name: 'Fish', texture: 'scales', emoji: '🐟', desc: 'They have shiny and wet scales.' }, 
          { id: 'crocodile', name: 'Crocodile', texture: 'scales', emoji: '🐊', desc: 'Very hard scales.' },
          { id: 'lizard', name: 'Lizard', texture: 'scales', emoji: '🦎', desc: 'Small and dry scales.' },
          { id: 'eagle', name: 'Eagle', texture: 'feathers', emoji: '🦅', desc: 'Strong feathers for flying.' }, 
          { id: 'crow', name: 'Crow', texture: 'feathers', emoji: '🐦‍⬛', desc: 'Black and shiny feathers.' }, 
          { id: 'parrot', name: 'Parrot', texture: 'feathers', emoji: '🦜', desc: 'Colorful feathers.' },
          { id: 'owl', name: 'Owl', texture: 'feathers', emoji: '🦉', desc: 'Very soft feathers.' },
          { id: 'dog', name: 'Dog', texture: 'fur', emoji: '🐶', desc: 'Our furry best friends.' }, 
          { id: 'lion', name: 'Lion', texture: 'fur', emoji: '🦁', desc: 'Thick and warm fur.' }, 
          { id: 'horse', name: 'Horse', texture: 'fur', emoji: '🐴', desc: 'Short and smooth fur.' },
          { id: 'panda', name: 'Panda', texture: 'fur', emoji: '🐼', desc: 'Thick black and white fur.' },
          { id: 'whale', name: 'Whale', texture: 'skin', emoji: '🐳', desc: 'Smooth skin.' }, 
          { id: 'dolphin', name: 'Dolphin', texture: 'skin', emoji: '🐬', desc: 'Very smooth skin for swimming fast.' }, 
          { id: 'frog', name: 'Frog', texture: 'skin', emoji: '🐸', desc: 'Smooth and wet skin.' },
          { id: 'elephant', name: 'Elephant', texture: 'skin', emoji: '🐘', desc: 'Rough and thick skin. Elephant skin is not smooth!' }
        ];

        const speak = (text) => {
          if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            window.speechSynthesis.speak(utterance);
          }
        };

        function App() {
          const [selectedTexture, setSelectedTexture] = useState(null);
          const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

          const navigateToHome = () => {
            window.location.href = '/index.html';
          };

          const Navbar = () => (
            <nav className="glass-effect shadow-sm h-16 border-b border-white/50 flex-shrink-0 z-50 sticky top-0">
              <div className="max-w-7xl mx-auto px-6 h-full flex justify-between items-center">
                <div className="flex items-center cursor-pointer group" onClick={navigateToHome}>
                  <div className="relative">
                    <img src="https://i.ibb.co/CFC5v9L/Machi-Know-Logo.png" alt="Logo" className="w-10 h-10 object-contain group-hover:rotate-12 transition-all duration-500"/>
                    <div className="absolute -top-1 -right-1 w-3 h-3 bg-orange-500 rounded-full border-2 border-white animate-pulse"></div>
                  </div>
                   <span className="font-logo font-black text-2xl text-slate-800 tracking-tighter ml-2">
                     Maachii<span className="text-orange-600">Know</span>
                   </span>
                </div>
                <div className="hidden md:flex items-center space-x-8">
                  <button onClick={navigateToHome} className="font-bold text-xs text-slate-400 hover:text-orange-600 uppercase tracking-[0.2em] transition-all">Home</button>
                </div>
                <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className="md:hidden text-slate-600 p-2">
                  {isMobileMenuOpen ? <X size={24} /> : <Menu size={24} />}
                </button>
              </div>
            </nav>
          );

          return (
            <div className="h-screen bg-[#f8fafc] flex flex-col overflow-hidden">
                <Navbar />

                <main className="flex-1 flex flex-col p-4 sm:p-8 min-h-0">
                  <div className="max-w-5xl mx-auto w-full h-full flex flex-col">
                    
                    {/* Compact Header */}
                    <div className="flex items-center justify-between mb-6 bg-white/50 backdrop-blur-md p-2 pl-4 rounded-2xl shadow-sm border border-white/80 flex-shrink-0">
                      <div className="flex items-center gap-3">
                        <div className="p-2 bg-emerald-100 rounded-xl">
                          <BookOpen className="text-emerald-600" size={20} />
                        </div>
                        <h2 className="text-lg sm:text-xl font-black text-slate-800 tracking-tight">Texture Explorer</h2>
                      </div>
                      <button 
                        onClick={() => selectedTexture ? setSelectedTexture(null) : null} 
                        className={`px-4 py-2 bg-white text-orange-600 font-bold text-sm border border-orange-100 rounded-xl shadow-sm hover:bg-orange-50 transition-all flex items-center gap-2 active:scale-95 ${!selectedTexture ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}
                      >
                        <ArrowLeft size={16} /> Back
                      </button>
                    </div>

                    <div className="flex-1 min-h-0">
                      {!selectedTexture ? (
                        <div className="grid grid-cols-2 grid-rows-2 gap-4 sm:gap-8 h-full animate-in fade-in zoom-in-95 duration-500">
                          {TEXTURES.map((t) => (
                            <button 
                              key={t.id} 
                              onClick={() => { setSelectedTexture(t); speak(t.name); }} 
                              className={`relative bg-white border border-slate-100 p-4 rounded-[2.5rem] shadow-premium hover:shadow-2xl hover:-translate-y-2 transform transition-all duration-500 group overflow-hidden flex flex-col items-center justify-center gap-4`}
                            >
                              {/* Gradient Background Decoration */}
                              <div className={`absolute inset-0 bg-gradient-to-br ${t.gradient} opacity-40 group-hover:opacity-60 transition-opacity`}></div>
                              
                              {/* Sparkle Decoration */}
                              <Sparkles className="absolute top-6 right-6 text-white/40 group-hover:text-white/80 transition-colors" size={24} />

                              <div className="relative">
                                {/* Double Ring Border */}
                                <div className={`absolute inset-0 rounded-full ring-4 ${t.ringColor} scale-110 opacity-50`}></div>
                                <img 
                                  src={t.image} 
                                  alt={t.name} 
                                  className={`w-24 h-24 sm:w-36 sm:h-36 lg:w-44 lg:h-44 object-cover rounded-full shadow-lg border-[6px] border-white relative z-10 group-hover:scale-105 transition-transform duration-500`}
                                />
                              </div>

                              <div className="relative z-10 text-center">
                                <h3 className={`text-2xl sm:text-4xl font-black ${t.textColor} tracking-tighter`}>{t.name}</h3>
                                <div className={`mt-2 flex items-center justify-center gap-1 text-[10px] sm:text-xs font-bold ${t.textColor} opacity-60 uppercase tracking-widest`}>
                                  View Collection <ChevronRight size={12} />
                                </div>
                              </div>
                            </button>
                          ))}
                        </div>
                      ) : (
                        <div className="bg-white rounded-[3rem] p-6 sm:p-10 border border-slate-100 shadow-2xl text-center relative h-full flex flex-col min-h-0 animate-in zoom-in-95 fade-in duration-500 overflow-hidden">
                          {/* Inner soft shadow decoration */}
                          <div className={`absolute inset-0 bg-gradient-to-b ${selectedTexture.gradient} opacity-20 pointer-events-none`}></div>
                          
                          <div className="flex-shrink-0 relative z-10 flex flex-col items-center">
                            <img 
                              src={selectedTexture.image} 
                              alt={selectedTexture.name} 
                              className="w-28 h-28 sm:w-40 sm:h-40 object-cover rounded-full shadow-xl border-[8px] border-white mb-4 animate-float"
                            />
                            <h3 className={`text-4xl sm:text-5xl font-black mb-2 ${selectedTexture.textColor} tracking-tight`}>{selectedTexture.name}</h3>
                            <div className={`inline-flex items-center gap-2 px-6 py-2 rounded-full text-sm sm:text-lg font-black mb-8 bg-white/80 backdrop-blur shadow-inner-soft border border-white ${selectedTexture.textColor}`}>
                              <span className="w-2 h-2 rounded-full bg-current animate-pulse"></span>
                              {selectedTexture.adjectives}
                            </div>
                          </div>

                          <div className="flex-1 overflow-y-auto custom-scroll pr-2 relative z-10">
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                              {ANIMALS.filter(a => a.texture === selectedTexture.id).map(animal => (
                                <div 
                                  key={animal.id} 
                                  className="bg-white/60 backdrop-blur-sm p-5 rounded-[2rem] border border-white hover:border-orange-200 hover:bg-white hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer flex flex-col items-center group relative overflow-hidden" 
                                  onClick={() => speak(animal.desc)}
                                >
                                  {/* Hover background splash */}
                                  <div className="absolute -right-4 -bottom-4 w-16 h-16 bg-orange-50 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                  
                                  <div className="text-5xl sm:text-6xl mb-3 transform group-hover:scale-110 group-hover:rotate-6 transition-transform relative z-10">
                                    {animal.emoji}
                                  </div>
                                  <div className="text-lg sm:text-xl font-black text-slate-700 tracking-tighter relative z-10">{animal.name}</div>
                                  
                                  <div className="mt-3 w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center opacity-40 group-hover:opacity-100 group-hover:bg-orange-100 transition-all">
                                    <Volume2 size={16} className="text-slate-400 group-hover:text-orange-600" />
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </main>

                <footer className="bg-white/50 backdrop-blur-sm border-t border-white/80 py-3 text-center shrink-0">
                  <div className="flex items-center justify-center gap-2">
                    <span className="w-1 h-1 bg-slate-300 rounded-full"></span>
                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em]">
                      © 2026 MaachiiKnow
                    </p>
                    <span className="w-1 h-1 bg-slate-300 rounded-full"></span>
                  </div>
                </footer>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
